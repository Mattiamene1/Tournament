<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{brand:{yellow:'#facc15',blue:'#1d4ed8',green:'#16a34a',dark:'#0f172a'}}}}}</script>
    <title>Classifica</title>

    <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
    <link rel="manifest" href="./assets/img/favicon/site.webmanifest">
    <link rel="stylesheet" href="./custom.css">

    <!-- Font Awesome (versione 6+) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-slate-50">

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <a href="/" class="logo-link">
                <img src="/assets/img/wildcard_logo.png" alt="Torneo Wildcard" class="logo-img">
                <span>WILDCARD</span>
            </a>
        </div>

        <nav>
            <a href="matches.html"><i class="fa-solid fa-calendar"></i> <span class="nav-label">Partite</span></a>
            <a class="active" href="standing.html"><i class="fa-solid fa-ranking-star"></i> <span class="nav-label">Classifiche</span></a>
            <a href="players.html"><i class="fa-solid fa-user"></i> <span class="nav-label">Giocatori</span></a>
            <a href="teams.html"><i class="fa-solid fa-users"></i> <span class="nav-label">Squadre</span></a>
            <a href="bar.html"><i class="fa-solid fa-beer-mug-empty"></i> <span class="nav-label">Chiosco</span></a>
        </nav>
    </header>

    <div class="container">
        <h1>🏆 Classifiche</h1>
        <div id="standings-container"><p>Caricamento classifiche gironi...</p></div>

        <!-- DOPO -->
        <h1>🥇 Tabellone Finale</h1>
            <div id="finals-link">
            <div class="standing-card" onclick="window.location.href='finals.html'"
                style="cursor:pointer; display:flex; align-items:center; justify-content:space-between; padding:20px 24px;">
                <span style="font-weight:bold; font-size:18px;"> Vai al Tabellone</span>
                <i class="fa-solid fa-chevron-right" style="color:#facc15; font-size:20px;"></i>
            </div>
        </div>

        <h1>⚽ Marcatori</h1>
        <div id="standings-scorers"><p>Caricamento classifica marcatori...</p></div>

    </div>

    <script>
        async function loadStandings() {
            try {
                const teamsRes = await fetch('/teams');
                const teams = await teamsRes.json();

                const matchesRes = await fetch('/matches');
                const matches = await matchesRes.json();

                const standingsByGroup = buildStandings(teams, matches);

                const container = document.getElementById('standings-container');
                container.innerHTML = '';

                Object.keys(standingsByGroup).forEach(groupName => {
                const rows = standingsByGroup[groupName];

                container.innerHTML += `
                    <div class="standing-card">
                    <h2>${groupName}</h2>

                    <div class="standing-table-wrapper">
                        <table class="standing-table">
                        <thead>
                            <tr>
                            <th>#</th>
                            <th>Squadra</th>
                            <th>PG</th>
                            <th>V</th>
                            <th>N</th>
                            <th>P</th>
                            <th>PT</th>
                            <th>GF</th>
                            <th>GS</th>
                            <th>DR</th>
                            <th>Forma</th>
                            </tr>
                        </thead>

                        <tbody>
                            ${rows.map((row, index) => renderStandingRow(row, index)).join('')}
                        </tbody>
                        </table>
                    </div>
                    </div>
                `;
                });

            } catch (err) {
                console.error(err);
                document.getElementById('standings-container').innerHTML =
                '<p style="color:red;">Errore nel caricamento classifiche</p>';
            }
        }

        async function loadScorers() {
            try {
                const [eventsRes, playersRes, teamsRes] = await Promise.all([
                fetch('/match-events'),
                fetch('/players'),
                fetch('/teams')
                ]);

                const events  = await eventsRes.json();
                const players = await playersRes.json();
                const teams   = await teamsRes.json();

                const scorerMap = {};

                // Gol
                events.forEach(e => {
                if (e.event_type !== 'goal' && e.event_type !== 'bonus') return;
                if (!e.player_id) return;

                if (!scorerMap[e.player_id]) {
                    scorerMap[e.player_id] = { goals: 0, assists: 0 };
                }
                scorerMap[e.player_id].goals += 1;
                });

                // Assist — usa assist_first_name / assist_last_name dal model
                events.forEach(e => {
                if (!e.assist_player_id) return;

                if (!scorerMap[e.assist_player_id]) {
                    scorerMap[e.assist_player_id] = { goals: 0, assists: 0 };
                }
                scorerMap[e.assist_player_id].assists += 1;
                });

                // Arricchisci con dati giocatore
                const rows = Object.entries(scorerMap)
                .map(([playerId, stats]) => {
                    const p = players.find(pl => String(pl.id) === String(playerId));
                    const team = p ? teams.find(t => String(t.id) === String(p.team_id)) : null;
                    return {
                    playerId,
                    teamId: p?.team_id || null,
                    name:     p ? `${p.first_name} ${p.last_name}` : `#${playerId}`,
                    teamName: team?.name || '',
                    ...stats
                    };
                })
                .filter(r => r.goals > 0 || r.assists > 0)
                .sort((a, b) => b.goals - a.goals || b.assists - a.assists);

                const container = document.getElementById('standings-scorers');

                if (!rows.length) {
                container.innerHTML = '<p>Nessun marcatore disponibile.</p>';
                return;
                }

                container.innerHTML = `
                <div class="standing-card">
                    <div class="standing-table-wrapper">
                    <table class="standing-table">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Giocatore</th>
                            <th>Squadra</th>
                            <th title="Gol">⚽</th>
                            <th title="Assist">🅰️</th>
                        </tr>
                        </thead>
                        <tbody>
                        ${rows.map((row, i) => `
                            <tr>
                            <td>${i + 1}</td>
                            <td>
                                <span class="standing-team clickable" onclick="goToPlayer(${row.playerId})">
                                <span>${row.name}</span>
                                </span>
                            </td>
                            <td>
                                <div class="standing-team ${row.teamName ? 'clickable' : ''}"
                                    ${row.teamName ? `onclick="goToTeam(${row.teamId})"` : ''}>
                                    ${row.teamName ? `
                                    <img src="${getTeamLogo(row.teamName)}" onerror="this.style.display='none'">
                                    <span>${formatTeamName(row.teamName)}</span>
                                    ` : '-'}
                                </div>
                            </td>
                            <td class="points-col">${row.goals}</td>
                            <td class="focus-col">${row.assists}</td>
                            </tr>
                        `).join('')}
                        </tbody>
                    </table>
                    </div>
                </div>
                `;

            } catch (err) {
                console.error(err);
                document.getElementById('standings-scorers').innerHTML =
                '<p style="color:red;">Errore nel caricamento marcatori</p>';
            }
        }

        function goToPlayer(id) {
            window.location.href = `player.html?id=${id}`;
        }

        function buildStandings(teams, matches) {
            const table = {};

            matches.forEach(match => {
                const groupName = match.group_name || 'Girone';

                if (!table[groupName]) table[groupName] = {};

                ensureTeam(table[groupName], match.home_team_id, match.home_team_name);
                ensureTeam(table[groupName], match.away_team_id, match.away_team_name);

                if (match.status !== 'finished') return;

                const home = table[groupName][match.home_team_id];
                const away = table[groupName][match.away_team_id];

                const homeScore = Number(match.home_score || 0);
                const awayScore = Number(match.away_score || 0);

                home.played++;
                away.played++;

                home.goalsFor += homeScore;
                home.goalsAgainst += awayScore;

                away.goalsFor += awayScore;
                away.goalsAgainst += homeScore;

                if (homeScore > awayScore) {
                home.wins++;
                home.points += 3;
                away.losses++;

                home.form.push({ result: 'V', matchId: match.id });
                away.form.push({ result: 'S', matchId: match.id });

                } else if (homeScore < awayScore) {
                away.wins++;
                away.points += 3;
                home.losses++;

                away.form.push({ result: 'V', matchId: match.id });
                home.form.push({ result: 'S', matchId: match.id });

                } else {
                home.draws++;
                away.draws++;
                home.points++;
                away.points++;

                home.form.push({ result: 'P', matchId: match.id });
                away.form.push({ result: 'P', matchId: match.id });
                }
            });

            Object.keys(table).forEach(groupName => {
                table[groupName] = Object.values(table[groupName])
                .map(row => ({
                    ...row,
                    goalDifference: row.goalsFor - row.goalsAgainst
                }))
                .sort((a, b) => {
                    if (b.points !== a.points) return b.points - a.points;
                    if (b.goalDifference !== a.goalDifference) return b.goalDifference - a.goalDifference;
                    if (b.goalsFor !== a.goalsFor) return b.goalsFor - a.goalsFor;
                    return a.name.localeCompare(b.name);
                });
            });

            return table;
        }

        function ensureTeam(groupTable, teamId, teamName) {
            if (!groupTable[teamId]) {
                groupTable[teamId] = {
                id: teamId,
                name: teamName,
                played: 0,
                wins: 0,
                draws: 0,
                losses: 0,
                points: 0,
                goalsFor: 0,
                goalsAgainst: 0,
                goalDifference: 0,
                form: []
                };
            }
        }

        function renderStandingRow(row, index) {
            return `
                <tr>
                <td>${index + 1}</td>

                <td>
                    <div class="standing-team clickable" onclick="goToTeam(${row.id})">
                    <img src="${getTeamLogo(row.name)}" alt="${row.name}">
                    <span>${formatTeamName(row.name)}</span>
                    </div>
                </td>

                <td class="focus-col">${row.played}</td>
                <td class="focus-col">${row.wins}</td>
                <td class="focus-col">${row.draws}</td>
                <td class="focus-col">${row.losses}</td>

                <td class="points-col">${row.points}</td>
                <td>${row.goalsFor}</td>
                <td>${row.goalsAgainst}</td>
                <td>${row.goalDifference}</td>

                <td>
                    <div class="form-dots">
                    ${renderForm(row.form)}
                    </div>
                </td>
                </tr>
            `;
        }

        function renderForm(form) {
            if (!form.length) return '-';

            return form.slice(-5).map(item => {
                const cls = item.result === 'V'
                ? 'win'
                : item.result === 'P'
                    ? 'draw'
                    : 'loss';

                return `
                <span class="form-dot ${cls}" onclick="event.stopPropagation(); goToMatch(${item.matchId})">
                    ${item.result}
                </span>
                `;
            }).join('');
        }

        function goToTeam(id) {
            window.location.href = `team.html?id=${id}`;
        }

        function goToMatch(id) {
            window.location.href = `match.html?id=${id}`;
        }

        function getTeamLogo(name) {
            return `/assets/storage/teams/${name.toLowerCase().replace(/\s+/g, '_')}_logo.png`;
        }

        function formatTeamName(name) {
            if (!name) return '';
            return name
                .split(' ')
                .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
                .join(' ');
        }

        loadStandings();
        loadScorers();
    </script>

</body>
</html>

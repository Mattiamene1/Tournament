<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{brand:{yellow:'#facc15',blue:'#1d4ed8',green:'#16a34a',dark:'#0f172a'}}}}}</script>
    <title>Chiosco</title>

    <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
    <link rel="manifest" href="./assets/img/favicon/site.webmanifest">

    <link rel="stylesheet" href="./custom.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-slate-50">

    <header class="navbar">
        <div class="logo">
            <a href="/" class="logo-link">
                <img src="/assets/img/wildcard_logo.png" alt="Torneo Wildcard" class="logo-img">
                <span>WILDCARD</span>
            </a>
        </div>

        <nav>
            <a href="matches.html"><i class="fa-solid fa-calendar"></i> <span class="nav-label">Partite</span></a>
            <a href="standing.html"><i class="fa-solid fa-ranking-star"></i> <span class="nav-label">Classifiche</span></a>
            <a href="players.html"><i class="fa-solid fa-user"></i> <span class="nav-label">Giocatori</span></a>
            <a href="teams.html"><i class="fa-solid fa-users"></i> <span class="nav-label">Squadre</span></a>
            <a class="active" href="bar.html"><i class="fa-solid fa-beer-mug-empty"></i> <span class="nav-label">Chiosco</span></a>
        </nav>
    </header>

    <div class="container">

        <h1>🍺 Coppa Chiosco</h1>

        <div class="chiosco-countdown-card">
            <div class="chiosco-countdown-title">Tempo rimanente</div>
            <div id="countdown" class="chiosco-countdown">Caricamento...</div>
            <div class="chiosco-deadline" style="display:flex; align-items:center; justify-content:center; gap:8px;">
                Scadenza: <span id="deadline-display">—</span>
                <button id="deadline-edit-btn" class="match-datetime-edit-toggle" onclick="toggleDeadlineEdit()" style="display:none;">
                    <i class="fa-solid fa-pen"></i>
                </button>
            </div>
            <div id="deadline-edit-box" class="schedule-edit-box" style="display:none; margin-top:12px;">
                <input class="match-datetime-input" id="deadline-input" type="datetime-local">
                <button class="match-datetime-button" onclick="saveDeadline()">Salva</button>
            </div>
        </div>

        <div id="chiosco-container">
            <p>Caricamento classifica chiosco...</p>
        </div>

    </div>

    <script>

        let logged = false;
        let deadline = new Date('2026-07-04T20:00:00');

        let originalBeers = {};
        let pendingBeers  = {};
        let teamsCache    = [];
        let sortedOrder   = [];
        let countdownInterval = null;

        async function checkAuth() {
            try {
                const res  = await fetch('/me');
                const data = await res.json();
                logged = data.logged;

                if (logged) {
                    document.getElementById('deadline-edit-btn').style.display = 'inline-flex';
                }
            } catch (err) {
                console.error('Errore verifica login', err);
                logged = false;
            }
        }

        async function loadChiosco() {
            try {
                const res   = await fetch('/chiosco-beers/standings');
                const teams = await res.json();

                teamsCache = teams;

                teams.forEach(team => {
                    originalBeers[team.id] = Number(team.beers || 0);
                    pendingBeers[team.id]  = Number(team.beers || 0);
                });

                sortedOrder = [...teams].sort(
                    (a, b) => Number(b.beers || 0) - Number(a.beers || 0)
                );

                document.getElementById('deadline-display').textContent =
                    deadline.toLocaleDateString('it-IT') + ' - ' +
                    deadline.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

                renderChiosco();
                startCountdown();

            } catch (err) {
                console.error(err);
                document.getElementById('chiosco-container').innerHTML =
                    '<p style="color:red;">Errore nel caricamento Coppa Chiosco</p>';
            }
        }

        function renderChiosco() {
            const sortedTeams = sortedOrder;

            const hasChanges = Object.keys(pendingBeers).some(id =>
                pendingBeers[id] !== originalBeers[id]
            );

            const container = document.getElementById('chiosco-container');

            container.innerHTML = `
                <div class="chiosco-list">
                    ${sortedTeams.map((team, index) => {
                        const changed = pendingBeers[team.id] !== originalBeers[team.id];

                        return `
                            <div class="chiosco-row ${index === 0 ? 'leader' : ''}">

                                <div class="chiosco-position">${index + 1}</div>

                                <div class="chiosco-team clickable" onclick="goToTeam(${team.id})">
                                    <img src="${getTeamLogo(team.name)}" alt="${team.name}">
                                    <span>${formatTeamName(team.name)}</span>
                                </div>

                                ${logged
                                    ? `<div class="chiosco-controls">
                                        <button class="chiosco-btn" onclick="event.stopPropagation(); updatePendingBeer(${team.id}, -1)">−</button>
                                        <div class="chiosco-count ${changed ? 'changed' : ''}">
                                            🍺 ${pendingBeers[team.id] || 0}
                                        </div>
                                        <button class="chiosco-btn" onclick="event.stopPropagation(); updatePendingBeer(${team.id}, 1)">+</button>
                                       </div>`
                                    : `<div class="chiosco-count ${changed ? 'changed' : ''}">
                                        🍺 ${pendingBeers[team.id] || 0}
                                       </div>`
                                }

                            </div>
                        `;
                    }).join('')}
                </div>

                ${hasChanges ? `
                    <div class="chiosco-confirm-box">
                        <button class="confirm-btn" onclick="confirmChanges()">Conferma</button>
                        <button class="cancel-btn"  onclick="cancelChanges()">Annulla</button>
                    </div>
                ` : ''}
            `;
        }

        function updatePendingBeer(teamId, amount) {
            pendingBeers[teamId] = Math.max(0, Number(pendingBeers[teamId] || 0) + amount);
            renderChiosco();
        }

        async function confirmChanges() {
            try {
                const requests = [];

                Object.keys(pendingBeers).forEach(teamId => {
                    const diff = pendingBeers[teamId] - originalBeers[teamId];
                    if (diff !== 0) {
                        requests.push(
                            fetch('/chiosco-beers', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ team_id: teamId, quantity: diff })
                            })
                        );
                    }
                });

                await Promise.all(requests);
                await loadChiosco();

            } catch (err) {
                console.error(err);
                alert('Errore salvataggio modifiche');
            }
        }

        function cancelChanges() {
            pendingBeers = { ...originalBeers };
            renderChiosco();
        }

        function toggleDeadlineEdit() {
            const box    = document.getElementById('deadline-edit-box');
            const btn    = document.getElementById('deadline-edit-btn');
            const isOpen = box.style.display === 'flex';

            box.style.display = isOpen ? 'none' : 'flex';
            btn.innerHTML = isOpen
                ? '<i class="fa-solid fa-pen"></i>'
                : '<i class="fa-solid fa-xmark"></i>';

            if (!isOpen) {
                const d = new Date(deadline);
                d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                document.getElementById('deadline-input').value = d.toISOString().slice(0, 16);
            }
        }

        function saveDeadline() {
            const val = document.getElementById('deadline-input').value;
            if (!val) return;

            deadline = new Date(val);

            document.getElementById('deadline-display').textContent =
                deadline.toLocaleDateString('it-IT') + ' - ' +
                deadline.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

            toggleDeadlineEdit();
        }

        function startCountdown() {
            updateCountdown();
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        function updateCountdown() {
            const now  = new Date();
            const diff = deadline - now;
            const el   = document.getElementById('countdown');

            if (diff <= 0) {
                el.innerHTML = '🏁 Tempo scaduto';
                return;
            }

            const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours   = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            el.innerHTML = `${days}g ${hours}h ${minutes}m ${seconds}s`;
        }

        function goToTeam(id) {
            window.location.href = `team.html?id=${id}`;
        }

        function getTeamLogo(name) {
            return `/assets/img/teams/${name.toLowerCase().replace(/\s+/g, '_')}_logo.png`;
        }

        function formatTeamName(name) {
            if (!name) return '';
            return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        }

        (async () => {
            await checkAuth();
            await loadChiosco();
        })();

    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildcard · Tabellone</title>

<link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  /* ============================================================
     WILDCARD · Tabellone da regia (TV 16:9)
     Stessa identità delle altre pagine: sfondo chiaro, card bianche,
     navbar navy + giallo, accento blu #1d4ed8, font Barlow.
     Layout fisso a 3 colonne, niente scroll di pagina; refresh 30s.
     Scala tipografica legata alla larghezza schermo => leggibile su TV.
  ============================================================ */
  :root{
    --bg:#f8fafc;
    --card:#ffffff;
    --ink:#0f172a;
    --ink-2:#1e293b;
    --blue:#1d4ed8;
    --blue-soft:#eff6ff;
    --yellow:#facc15;
    --green:#16a34a;
    --amber:#d97706;
    --purple:#7c3aed;
    --red:#ef4444;
    --line:#e2e8f0;
    --line-soft:#f1f5f9;
    --grey:#f0f2f5;
    --muted:#64748b;
    --muted-2:#94a3b8;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html{ font-size:clamp(11px, 0.84vw, 24px); }

  body{
    font-family:'Barlow',sans-serif;
    background:var(--bg);
    color:#111827;
    height:100vh;width:100vw;overflow:hidden;
    -webkit-font-smoothing:antialiased;line-height:1.4;
  }
  img{max-width:100%;}

  .board{height:100vh;display:grid;grid-template-rows:auto auto 1fr auto;}

  /* ---------- NAVBAR (come le altre pagine) ---------- */
  .navbar{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--ink);
    padding:0.6rem 1.4rem;
    border-bottom:0.18rem solid var(--yellow);
    box-shadow:0 2px 20px rgba(0,0,0,.25);
    flex:none;
  }
  .logo{
    display:flex;align-items:center;gap:0.7rem;
    font-weight:900;color:var(--yellow);
    letter-spacing:.06em;text-transform:uppercase;font-size:1.5rem;
  }
  .logo img{width:2.4rem;height:2.4rem;object-fit:contain;}
  .nav-right{display:flex;align-items:center;gap:1.4rem;}
  .nav-links{display:flex;gap:0.3rem;}
  .nav-links a{
    color:#e2e8f0;text-decoration:none;
    padding:0.45rem 0.8rem;border-radius:0.5rem;
    font-size:0.85rem;font-weight:600;letter-spacing:.03em;text-transform:uppercase;
    display:flex;align-items:center;gap:0.4rem;
  }
  .nav-links a.active{background:var(--yellow);color:var(--ink);}
  .clock-wrap{text-align:right;line-height:1.05;color:#e2e8f0;}
  .clock-wrap .time{font-weight:800;font-size:1.4rem;color:#fff;letter-spacing:.02em;font-variant-numeric:tabular-nums;}
  .clock-wrap .date{font-size:0.78rem;color:#94a3b8;text-transform:capitalize;}
  .refresh-pill{
    display:flex;align-items:center;gap:0.45rem;
    background:rgba(250,204,21,.16);border:0.08rem solid rgba(250,204,21,.5);
    color:var(--yellow);font-weight:700;font-size:0.78rem;letter-spacing:.03em;
    padding:0.4rem 0.7rem;border-radius:999px;white-space:nowrap;
  }
  .refresh-pill .dot{width:0.5rem;height:0.5rem;border-radius:50%;background:var(--yellow);}
  .refresh-pill.flash .dot{animation:ping .9s ease-out;}
  @keyframes ping{0%{transform:scale(.6);opacity:.4}50%{transform:scale(1.5);opacity:1}100%{transform:scale(1);opacity:1}}

  /* ---------- FASCIA LIVE ---------- */
  .livebar{display:flex;align-items:stretch;gap:0.7rem;padding:0.7rem 1.1rem 0;}
  .livebar.empty{display:none;}
  .live-flag{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-width:5.5rem;background:var(--red);border-radius:0.7rem;color:#fff;
    box-shadow:0 2px 10px rgba(239,68,68,.3);
  }
  .live-flag .led{width:0.8rem;height:0.8rem;border-radius:50%;background:#fff;animation:blink 1.1s steps(2,start) infinite;}
  @keyframes blink{50%{opacity:.3}}
  .live-flag .txt{font-weight:900;letter-spacing:.14em;font-size:1.05rem;margin-top:0.35rem;}
  .live-track{display:flex;gap:0.7rem;flex:1;min-width:0;}
  .live-match{
    flex:1;min-width:0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:0.7rem;
    background:var(--card);border:1px solid var(--line);border-radius:0.75rem;
    border-top:0.22rem solid var(--yellow);
    box-shadow:0 2px 10px rgba(0,0,0,.06);padding:0.6rem 1rem;
  }
  .live-match .side{display:flex;align-items:center;gap:0.6rem;min-width:0;}
  .live-match .side.away{flex-direction:row-reverse;text-align:right;}
  .live-match .crest{width:2.6rem;height:2.6rem;}
  .live-match .tname{font-weight:800;font-size:1.45rem;line-height:1.05;color:var(--ink-2);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .live-center{display:flex;flex-direction:column;align-items:center;gap:0.25rem;}
  .live-score{font-weight:900;font-size:2.6rem;line-height:0.9;color:var(--blue);letter-spacing:.01em;font-variant-numeric:tabular-nums;}
  .live-score .so{font-size:1.1rem;color:var(--purple);font-weight:800;}
  .live-phase{
    font-weight:800;font-size:0.92rem;letter-spacing:.05em;text-transform:uppercase;
    padding:0.16rem 0.6rem;border-radius:999px;white-space:nowrap;
  }
  .live-phase .mclock{font-variant-numeric:tabular-nums;}
  .ph-first,.ph-second{background:#dcfce7;color:#15803d;}
  .ph-half{background:#fef3c7;color:#b45309;}
  .ph-shootout{background:#ede9fe;color:#6d28d9;}
  .ph-extra{background:var(--blue-soft);color:var(--blue);}

  /* ---------- GRIGLIA ---------- */
  .grid{display:grid;grid-template-columns:1.2fr 1.15fr 0.72fr;gap:0.9rem;min-height:0;padding:0.7rem 1.1rem;}
  .col{display:flex;flex-direction:column;gap:0.9rem;min-height:0;}

  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:0.75rem;
    box-shadow:0 2px 10px rgba(0,0,0,.06);
    display:flex;flex-direction:column;min-height:0;overflow:hidden;
  }
  .panel.flex{flex:1;}
  .panel.half{flex:1;}
  .panel.grow{flex:1;min-height:0;}
  .panel.grouppanel{flex:0 0 auto;}  /* gironi: altezza in base al contenuto */
  .phead{display:flex;align-items:center;gap:0.55rem;padding:0.55rem 0.95rem;border-bottom:1px solid var(--line);}
  .phead .ic{color:var(--blue);font-size:1.05rem;width:1.4rem;text-align:center;}
  .phead h2{font-weight:900;font-size:1.25rem;color:var(--ink);letter-spacing:-0.01em;}
  .phead .tag{margin-left:auto;font-size:0.72rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-weight:700;}
  .pbody{padding:0.55rem 0.7rem 0.7rem;overflow:auto;min-height:0;}
  .pbody::-webkit-scrollbar{width:0.4rem;}
  .pbody::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px;}

  /* ---------- TABELLE CLASSIFICA ---------- */
  table{width:100%;border-collapse:collapse;}
  .standtable th{
    color:var(--blue);background:var(--grey);
    font-size:0.78rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    text-align:center;padding:0.4rem 0.25rem;
  }
  .standtable th.lt{text-align:left;padding-left:0.6rem;}
  .standtable th:first-child{border-top-left-radius:0.4rem;border-bottom-left-radius:0.4rem;}
  .standtable th:last-child{border-top-right-radius:0.4rem;border-bottom-right-radius:0.4rem;}
  .standtable td{
    font-size:0.95rem;text-align:center;padding:0.36rem 0.25rem;
    border-bottom:1px solid var(--line-soft);color:var(--ink-2);font-variant-numeric:tabular-nums;
  }
  .standtable tr:last-child td{border-bottom:none;}
  .standtable .pos{font-weight:800;color:var(--muted);width:1.7rem;}
  .standtable tr.q{background:#fffdf2;}
  .standtable tr.q .pos{color:var(--amber);}
  .standtable tr.q td.team .bar{background:var(--yellow);}
  .standtable td.team{text-align:left;}
  .team-cell{display:flex;align-items:center;gap:0.5rem;min-width:0;}
  .team-cell .bar{width:0.22rem;height:1.5rem;border-radius:999px;background:transparent;flex:none;}
  .team-cell .crest{width:1.8rem;height:1.8rem;}
  .team-cell .nm{font-weight:700;font-size:0.98rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .standtable td.pts{font-weight:900;font-size:1.15rem;color:var(--blue);}
  .standtable td.foc{color:#334155;font-weight:600;}
  .standtable td.dr{color:var(--muted);}

  .form{display:flex;gap:0.18rem;justify-content:center;}
  .fdot{width:1.2rem;height:1.2rem;border-radius:50%;color:#fff;
    font-weight:700;font-size:0.7rem;display:flex;align-items:center;justify-content:center;}
  .fdot.win{background:var(--green);}
  .fdot.draw{background:var(--amber);}
  .fdot.loss{background:var(--red);}

  /* ---------- MARCATORI ---------- */
  .scorer{display:grid;grid-template-columns:1.7rem 1fr auto auto;align-items:center;gap:0.6rem;
    padding:0.36rem 0.5rem;border-bottom:1px solid var(--line-soft);}
  .scorer:last-child{border-bottom:none;}
  .scorer .rk{font-weight:800;color:var(--muted);text-align:center;}
  .scorer.top{background:#fffdf2;border-radius:0.45rem;}
  .scorer.top .rk{color:var(--amber);}
  .scorer .who{min-width:0;display:flex;align-items:center;gap:0.4rem;}
  .scorer .who .pn{font-weight:700;font-size:1rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:0 1 auto;}
  .scorer .who .tn{font-size:0.85rem;color:var(--muted);white-space:nowrap;
    display:inline-flex;align-items:center;gap:0.2rem;flex:none;}
  .scorer .who .tn .crest{width:1.05rem;height:1.05rem;}
  .scorer .who .tn .tnm{overflow:hidden;text-overflow:ellipsis;}
  .scorer .stat{font-weight:900;font-size:1.15rem;min-width:2.4rem;text-align:right;font-variant-numeric:tabular-nums;}
  .scorer .goals{color:var(--blue);}
  .scorer .assists{color:var(--green);font-size:0.98rem;}
  .scorer .stat small{font-size:0.62rem;color:var(--muted-2);font-weight:700;margin-left:0.12rem;}

  /* ---------- CALENDARIO ---------- */
  .cal-day{font-weight:800;font-size:0.82rem;letter-spacing:.06em;text-transform:uppercase;
    color:var(--blue);padding:0.55rem 0.55rem 0.3rem;}
  .fix{display:grid;grid-template-columns:3.4rem 1fr auto 1fr;align-items:center;gap:0.5rem;
    padding:0.36rem 0.55rem;border-radius:0.5rem;border-bottom:1px solid var(--line-soft);}
  .fix.live{background:#f0fdf4;border:1px solid #bbf7d0;}
  .fix .ftime{font-weight:600;font-size:0.78rem;color:var(--muted);text-align:center;line-height:1.1;}
  .fix .ftime b{display:block;color:var(--ink-2);font-size:0.92rem;font-weight:800;}
  .fix .ft{display:flex;align-items:center;gap:0.4rem;min-width:0;}
  .fix .ft.home{justify-content:flex-end;}
  .fix .ft .nm{font-weight:700;font-size:0.95rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fix .ft .crest{width:1.6rem;height:1.6rem;}
  .fix .fsc{font-weight:900;font-size:1.2rem;min-width:3.4rem;text-align:center;color:var(--ink);letter-spacing:.01em;font-variant-numeric:tabular-nums;}
  .fix .fsc.vs{color:var(--muted-2);font-size:0.92rem;font-weight:800;}
  .fix .fsc .so{display:block;font-size:0.62rem;color:var(--purple);font-weight:800;margin-top:-0.1rem;}
  .fix .fstat{justify-self:end;font-size:0.72rem;font-weight:800;letter-spacing:.03em;
    white-space:nowrap;padding:0.16rem 0.5rem;border-radius:999px;text-transform:uppercase;}
  .st-live{background:#dcfce7;color:#15803d;}
  .st-half{background:#fef3c7;color:#b45309;}
  .st-sched{background:var(--blue-soft);color:#156ed4;}
  .st-done{background:#f1f5f9;color:var(--muted);}
  .st-extra{background:#dcfce7;color:#15803d;}
  .st-so{background:#ede9fe;color:#6d28d9;}

  /* ---------- CHIOSCO ---------- */
  .beer{display:grid;grid-template-columns:1.9rem 1fr auto;align-items:center;gap:0.6rem;
    padding:0.45rem 0.6rem;border:1px solid var(--line);border-radius:0.6rem;margin-bottom:0.45rem;}
  .beer:last-child{margin-bottom:0;}
  .beer .rk{font-weight:900;font-size:1.15rem;color:var(--blue);text-align:center;}
  .beer.lead{border:2px solid var(--yellow);background:#fffbeb;}
  .beer .team-cell .nm{font-size:1rem;}
  .beer .team-cell .crest{width:1.9rem;height:1.9rem;}
  .beer .cnt{font-weight:900;font-size:1.3rem;color:var(--blue);display:flex;align-items:center;gap:0.3rem;font-variant-numeric:tabular-nums;}
  .beer .cnt .em{font-size:1rem;}

  /* ---------- CREST + fallback monogramma ---------- */
  .crest{border-radius:0.35rem;object-fit:contain;background:var(--grey);
    border:1px solid var(--line);padding:0.12rem;display:block;}
  .mono{border-radius:0.35rem;display:inline-flex;align-items:center;justify-content:center;
    font-weight:900;color:#fff;background:var(--blue);border:1px solid var(--blue);flex:none;}

  .empty-note{color:var(--muted);font-size:0.95rem;padding:1rem 0.6rem;text-align:center;}

  /* ---------- FOOTER ---------- */
  .botbar{display:flex;align-items:center;gap:1rem;
    border-top:1px solid var(--line);padding:0.45rem 1.4rem;
    font-size:0.78rem;color:var(--muted);background:var(--card);flex:none;}
  .botbar .grow{flex:1;}
  .botbar .legend{display:flex;gap:0.9rem;align-items:center;}
  .botbar .legend span{display:inline-flex;align-items:center;gap:0.32rem;}
  .botbar .legend i{width:0.85rem;height:0.85rem;border-radius:50%;display:inline-block;}

  @media (prefers-reduced-motion: reduce){
    .live-flag .led{animation:none;opacity:1;}
    .refresh-pill.flash .dot{animation:none;}
  }
</style>
</head>

<body>
<div class="board">

  <!-- HEADER (solo logo) -->
  <header class="navbar">
    <div class="logo">
      <img src="/assets/img/wildcard_logo.png" alt="Torneo Wildcard">
      <span>WILDCARD</span>
    </div>
  </header>

  <!-- FASCIA LIVE -->
  <section class="livebar empty" id="livebar">
    <div class="live-flag"><span class="led"></span><span class="txt">IN CORSO</span></div>
    <div class="live-track" id="liveTrack"></div>
  </section>

  <!-- GRIGLIA -->
  <main class="grid">

    <!-- COLONNA 1 — gironi + marcatori -->
    <div class="col" id="col1">
      <!-- i due gironi vengono iniettati qui dal JS, prima dei marcatori -->
      <div class="panel grow" id="scorersPanel">
        <div class="phead"><span class="ic"><i class="fa-solid fa-futbol"></i></span><h2>Marcatori</h2><span class="tag">Gol · Assist</span></div>
        <div class="pbody" id="scorersBody"><div class="empty-note">Caricamento marcatori…</div></div>
      </div>
    </div>

    <!-- COLONNA 2 — calendario -->
    <div class="col">
      <div class="panel flex">
        <div class="phead"><span class="ic"><i class="fa-solid fa-calendar-day"></i></span><h2>Calendario partite</h2><span class="tag" id="calCount"></span></div>
        <div class="pbody" id="calBody"><div class="empty-note">Caricamento partite…</div></div>
      </div>
    </div>

    <!-- COLONNA 3 — solo Coppa Chiosco -->
    <div class="col">
      <div class="panel grow">
        <div class="phead"><span class="ic"><i class="fa-solid fa-beer-mug-empty"></i></span><h2>Coppa Chiosco</h2></div>
        <div class="pbody" id="chioscoBody"><div class="empty-note">Caricamento chiosco…</div></div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="botbar">
    <span>🏆 Torneo Wildcard</span>
    <span class="grow"></span>
    <span id="lastUpdate">Ultimo aggiornamento —</span>
  </footer>

</div>
<script>
/* ============================================================
   CONFIG
============================================================ */
const REFRESH_MS   = 30000;   // auto-refresh dati ogni 30s
const HALF_MS      = 8 * 60000;   // un tempo = 8'
const DICE_MS      = 2 * 60000;   // dado Wildcard (extra 1° tempo)
const QUALIFY_TOP  = 2;           // squadre evidenziate per girone (passano il turno)

/* ============================================================
   UTILITY
============================================================ */
function fmtTeamName(name){
  if(!name) return '';
  return name.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
}
function logoUrl(name){
  if(!name) return '';
  return `/assets/storage/teams/${name.toLowerCase().replace(/\s+/g,'_')}_logo.png`;
}
function initials(name){
  if(!name) return '?';
  const p = name.trim().split(/\s+/);
  return (p.length>1 ? p[0][0]+p[1][0] : p[0].slice(0,2)).toUpperCase();
}
/* crest con fallback monogramma (loghi mancanti => iniziali su cerchio giallo) */
function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function crest(name, sizeRem){
  const sz = sizeRem || 1.7;
  if(!name){
    return `<span class="mono crest" style="width:${sz}rem;height:${sz}rem;font-size:${sz*0.42}rem">${initials(name)}</span>`;
  }
  return `<img class="crest" style="width:${sz}rem;height:${sz}rem" src="${logoUrl(name)}" alt=""`
       + ` data-name="${escapeHtml(name)}" data-sz="${sz}" onerror="crestFallback(this)">`;
}
/* sostituisce l'immagine fallita con un monogramma (no problemi di quoting) */
function crestFallback(img){
  const name = img.getAttribute('data-name')||'';
  const sz = parseFloat(img.getAttribute('data-sz'))||1.7;
  const span = document.createElement('span');
  span.className = 'mono crest';
  span.style.width = sz+'rem';
  span.style.height = sz+'rem';
  span.style.fontSize = (sz*0.42)+'rem';
  span.textContent = initials(name);
  img.replaceWith(span);
}
function parseDate(v){ return v ? new Date(v) : null; }
function pad(n){ return String(n).padStart(2,'0'); }

/* ============================================================
   CRONOMETRO LIVE (replica match.html: 2 tempi da 8' + dado)
============================================================ */
function matchClockHtml(m){
  const phase = m.phase;
  const start = parseDate(m.started_at);
  const paused = Number(m.paused_ms||0);
  const now = m.paused_at ? parseDate(m.paused_at) : new Date();

  let base=0, half=0;
  if(phase==='first_half' && start){
    base=0; half=Math.max(0,(now-start)-paused);
  } else if(phase==='second_half'){
    const ss=parseDate(m.second_half_started_at);
    base=HALF_MS; half=Math.max(0, ss ? ((now-ss)-paused) : 0);
  } else {
    return '';
  }
  const reg = Math.min(half, HALF_MS);
  const rec = Math.max(0, half-HALF_MS);
  const mainSec = Math.floor((base+reg)/1000);
  let txt = `${pad(Math.floor(mainSec/60))}:${pad(mainSec%60)}`;
  if(rec>0){
    const rs=Math.floor(rec/1000);
    const recTxt=`${pad(Math.floor(rs/60))}:${pad(rs%60)}`;
    if(phase==='first_half' && rec<=DICE_MS) txt += ` 🎲+${recTxt}`;
    else txt += ` +${recTxt}`;
  }
  return `<span class="mclock">${txt}</span>`;
}

function liveLabel(m){
  switch(m.phase){
    case 'first_half':  return {cls:'ph-first',  txt:'1° Tempo',  clock:true};
    case 'halftime':    return {cls:'ph-half',   txt:'Intervallo',clock:false};
    case 'second_half': return {cls:'ph-second', txt:'2° Tempo',  clock:true};
    case 'extra_time':  return {cls:'ph-extra',  txt:'Supplementari',clock:false};
    case 'shootout':    return {cls:'ph-shootout',txt:'Rigori',    clock:false};
    default:            return {cls:'ph-first',  txt:'Live',       clock:false};
  }
}

function hadShootout(m){
  return m.phase==='shootout' ||
    (Number(m.home_shootout_score||0)+Number(m.away_shootout_score||0))>0;
}

/* ============================================================
   STATO + FETCH
============================================================ */
let DATA = { matches:[], teams:[], players:[], events:[], chiosco:[] };

async function getJSON(url){
  const r = await fetch(url, {cache:'no-store'});
  if(!r.ok) throw new Error(url+' '+r.status);
  return r.json();
}

async function refreshData(){
  try{
    const [matches, teams, players, events, chiosco] = await Promise.all([
      getJSON('/matches'),
      getJSON('/teams'),
      getJSON('/players'),
      getJSON('/match-events'),
      getJSON('/chiosco-beers/standings')
    ]);
    DATA = { matches, teams, players, events, chiosco };
    renderAll();
    markUpdated();
  }catch(err){
    console.error('Refresh fallito', err);
  }
}

function markUpdated(){
  const now = new Date();
  const el = document.getElementById('lastUpdate');
  if(el) el.textContent =
    'Ultimo aggiornamento ' + now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

/* ============================================================
   CLASSIFICHE GIRONI (replica logica standing.html)
============================================================ */
function buildStandings(matches){
  const table={};
  matches.forEach(match=>{
    const g = match.group_name || 'Girone';
    if(!table[g]) table[g]={};
    ensureTeam(table[g], match.home_team_id, match.home_team_name);
    ensureTeam(table[g], match.away_team_id, match.away_team_name);
    if(match.status!=='finished') return;

    const home=table[g][match.home_team_id], away=table[g][match.away_team_id];
    const hs=Number(match.home_score||0), as=Number(match.away_score||0);
    home.played++; away.played++;
    home.gf+=hs; home.ga+=as; away.gf+=as; away.ga+=hs;

    if(hs>as){
      home.wins++; home.points+=3; away.losses++;
      home.form.push('V'); away.form.push('S');
    }else if(hs<as){
      away.wins++; away.points+=3; home.losses++;
      away.form.push('V'); home.form.push('S');
    }else{
      home.draws++; away.draws++;
      const hso=Number(match.home_shootout_score||0), aso=Number(match.away_shootout_score||0);
      if(hso>aso){home.points+=2; away.points+=1;}
      else if(aso>hso){away.points+=2; home.points+=1;}
      else{home.points+=1; away.points+=1;}
      home.form.push('P'); away.form.push('P');
    }
  });

  Object.keys(table).forEach(g=>{
    table[g]=Object.values(table[g])
      .map(r=>({...r, dr:r.gf-r.ga}))
      .sort((a,b)=> b.points-a.points || b.dr-a.dr || b.gf-a.gf || a.name.localeCompare(b.name));
  });
  return table;
}
function ensureTeam(gt, id, name){
  if(!gt[id]) gt[id]={id,name,played:0,wins:0,draws:0,losses:0,points:0,gf:0,ga:0,dr:0,form:[]};
}
function formHtml(form){
  if(!form.length) return '<span style="color:var(--muted-2)">—</span>';
  return `<div class="form">${form.slice(-5).map(r=>{
    const cls = r==='V'?'win':r==='P'?'draw':'loss';
    return `<span class="fdot ${cls}">${r}</span>`;
  }).join('')}</div>`;
}

function renderGroups(){
  const groups = buildStandings(DATA.matches);
  const names = Object.keys(groups).sort((a,b)=>a.localeCompare(b,'it'));
  const col = document.getElementById('col1');
  const anchor = document.getElementById('scorersPanel');

  // rimuovo i pannelli gironi precedenti (i marcatori restano sempre)
  col.querySelectorAll('[data-grouppanel]').forEach(n=>n.remove());

  if(!names.length){
    const ph = document.createElement('div');
    ph.className = 'panel grouppanel'; ph.setAttribute('data-grouppanel','');
    ph.innerHTML = `<div class="phead"><span class="ic"><i class="fa-solid fa-layer-group"></i></span><h2>Classifiche gironi</h2></div><div class="pbody"><div class="empty-note">Nessun girone disponibile.</div></div>`;
    col.insertBefore(ph, anchor);
    return;
  }

  names.forEach(name=>{
    const rows = groups[name];
    const panel = document.createElement('div');
    panel.className = 'panel grouppanel';
    panel.setAttribute('data-grouppanel','');
    panel.innerHTML = `
        <div class="phead">
          <span class="ic"><i class="fa-solid fa-layer-group"></i></span>
          <h2>${name}</h2>
        </div>
        <div class="pbody">
          <table class="standtable">
            <thead><tr>
              <th></th><th class="lt">Squadra</th>
              <th>PG</th><th>V</th><th>N</th><th>P</th>
              <th>GF</th><th>GS</th><th>DR</th><th>PT</th><th>Forma</th>
            </tr></thead>
            <tbody>
              ${rows.map((r,i)=>`
                <tr class="${i<QUALIFY_TOP?'q':''}">
                  <td class="pos">${i+1}</td>
                  <td class="team"><div class="team-cell"><span class="bar"></span>${crest(r.name,1.7)}<span class="nm">${fmtTeamName(r.name)}</span></div></td>
                  <td class="foc">${r.played}</td><td class="foc">${r.wins}</td><td class="foc">${r.draws}</td><td class="foc">${r.losses}</td>
                  <td>${r.gf}</td><td>${r.ga}</td><td class="dr">${r.dr>0?'+':''}${r.dr}</td>
                  <td class="pts">${r.points}</td>
                  <td>${formHtml(r.form)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    col.insertBefore(panel, anchor);
  });
}

/* ============================================================
   MARCATORI (replica logica standing.html)
============================================================ */
function renderScorers(){
  const {events, players, teams} = DATA;
  const map={};
  events.forEach(e=>{
    if((e.event_type==='goal'||e.event_type==='bonus') && e.player_id){
      (map[e.player_id] ||= {goals:0,assists:0}).goals++;
    }
  });
  events.forEach(e=>{
    if(e.assist_player_id){
      (map[e.assist_player_id] ||= {goals:0,assists:0}).assists++;
    }
  });

  const rows = Object.entries(map).map(([pid,st])=>{
    const p = players.find(pl=>String(pl.id)===String(pid));
    const t = p ? teams.find(tt=>String(tt.id)===String(p.team_id)) : null;
    return { name: p?`${p.first_name} ${p.last_name}`:`#${pid}`, team:t?.name||'', ...st };
  })
  .filter(r=>r.goals>0||r.assists>0)
  .sort((a,b)=> b.goals-a.goals || b.assists-a.assists || a.name.localeCompare(b.name))
  .slice(0,12);

  const body = document.getElementById('scorersBody');
  if(!rows.length){ body.innerHTML='<div class="empty-note">Ancora nessun marcatore.</div>'; return; }

  body.innerHTML = rows.map((r,i)=>`
    <div class="scorer ${i===0?'top':''}">
      <span class="rk">${i+1}</span>
      <div class="who">
        <span class="pn">${r.name}</span>
        ${r.team ? `<span class="tn">(${crest(r.team,1.05)}<span class="tnm">${fmtTeamName(r.team)}</span>)</span>` : ''}
      </div>
      <span class="stat goals">${r.goals}<small>⚽</small></span>
      <span class="stat assists">${r.assists}<small>A</small></span>
    </div>`).join('');
}

/* ============================================================
   CALENDARIO  (live in evidenza, poi in programma, poi terminate)
============================================================ */
function fixtureSort(a,b){
  const rank = m => m.status==='live'?0 : m.status==='scheduled'?1 : 2;
  const ra=rank(a), rb=rank(b);
  if(ra!==rb) return ra-rb;
  const da=new Date(a.match_date||0), db=new Date(b.match_date||0);
  // finite: più recenti in alto; le altre: cronologiche
  return (ra===2) ? db-da : da-db;
}
function dayKey(d){
  if(!d) return 'Da definire';
  return new Date(d).toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long'});
}
function fixtureStatus(m){
  if(m.status==='live'){
    switch(m.phase){
      case 'halftime': return {cls:'st-half', txt:'Intervallo'};
      case 'first_half': return {cls:'st-live', txt:'Live 1°T'};
      case 'second_half': return {cls:'st-live', txt:'Live 2°T'};
      case 'extra_time': return {cls:'st-extra', txt:'Suppl.'};
      case 'shootout': return {cls:'st-so', txt:'Rigori'};
      default: return {cls:'st-live', txt:'Live'};
    }
  }
  if(m.status==='finished') return {cls:'st-done', txt: hadShootout(m)?'Fine (rig.)':'Finita'};
  return {cls:'st-sched', txt:'In programma'};
}
function fixtureScore(m){
  if(m.status==='scheduled') return `<div class="fsc vs">VS</div>`;
  const so = hadShootout(m) ? `<span class="so">(${m.home_shootout_score||0}-${m.away_shootout_score||0})</span>` : '';
  return `<div class="fsc">${m.home_score||0} - ${m.away_score||0}${so}</div>`;
}

function renderCalendar(){
  const matches = [...DATA.matches].sort(fixtureSort);
  const body = document.getElementById('calBody');
  document.getElementById('calCount').textContent = `${matches.length} partite`;

  if(!matches.length){ body.innerHTML='<div class="empty-note">Nessuna partita disponibile.</div>'; return; }

  let html=''; let lastDay=null;
  matches.forEach(m=>{
    const dk = dayKey(m.match_date);
    if(dk!==lastDay){ html+=`<div class="cal-day">${dk}</div>`; lastDay=dk; }
    const isLive = m.status==='live';
    const time = m.match_date
      ? `<b>${new Date(m.match_date).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}</b>${m.group_name?m.group_name.replace('Girone','Gir.'):''}`
      : (m.group_name||'');
    html+=`
      <div class="fix ${isLive?'live':''}">
        <div class="ftime">${time}</div>
        <div class="ft home"><span class="nm">${fmtTeamName(m.home_team_name)}</span>${crest(m.home_team_name,1.5)}</div>
        ${fixtureScore(m)}
        <div class="ft away">${crest(m.away_team_name,1.5)}<span class="nm">${fmtTeamName(m.away_team_name)}</span></div>
      </div>`;
  });
  body.innerHTML=html;
}

/* ============================================================
   FASCIA LIVE
============================================================ */
function renderLive(){
  const live = DATA.matches.filter(m=>m.status==='live');
  const bar = document.getElementById('livebar');
  const track = document.getElementById('liveTrack');

  if(!live.length){ bar.classList.add('empty'); track.innerHTML=''; return; }
  bar.classList.remove('empty');

  track.innerHTML = live.map(m=>{
    const lab = liveLabel(m);
    const so = hadShootout(m) ? `<span class="so">(${m.home_shootout_score||0}-${m.away_shootout_score||0})</span>` : '';
    const clockSpan = lab.clock ? ` · <span data-clock="${m.id}">${matchClockHtml(m)}</span>` : '';
    return `
      <div class="live-match">
        <div class="side home">${crest(m.home_team_name,2.6)}<span class="tname">${fmtTeamName(m.home_team_name)}</span></div>
        <div class="live-center">
          <div class="live-score">${m.home_score||0} - ${m.away_score||0} ${so}</div>
          <span class="live-phase ${lab.cls}">${lab.txt}${clockSpan}</span>
        </div>
        <div class="side away">${crest(m.away_team_name,2.6)}<span class="tname">${fmtTeamName(m.away_team_name)}</span></div>
      </div>`;
  }).join('');
}

/* aggiorna solo i cronometri ogni secondo (senza ridisegnare tutto) */
function tickClocks(){
  document.querySelectorAll('[data-clock]').forEach(el=>{
    const id = el.getAttribute('data-clock');
    const m = DATA.matches.find(x=>String(x.id)===String(id));
    if(m) el.innerHTML = matchClockHtml(m);
  });
}

/* ============================================================
   RENDER + LOOP
============================================================ */
function renderAll(){
  renderLive();
  renderGroups();
  renderCalendar();
  renderScorers();
  renderChiosco();
}

function renderChiosco(){
  const teams = [...DATA.chiosco].sort((a,b)=>Number(b.beers||0)-Number(a.beers||0));
  const body = document.getElementById('chioscoBody');
  if(!teams.length){ body.innerHTML='<div class="empty-note">Nessun dato chiosco.</div>'; return; }
  body.innerHTML = teams.map((t,i)=>`
    <div class="beer ${i===0?'lead':''}">
      <span class="rk">${i+1}</span>
      <div class="team-cell">${crest(t.name,1.8)}<span class="nm">${fmtTeamName(t.name)}</span></div>
      <span class="cnt"><span class="em">🍺</span>${Number(t.beers||0)}</span>
    </div>`).join('');
}

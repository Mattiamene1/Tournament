<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{brand:{yellow:'#facc15',blue:'#1d4ed8',green:'#16a34a',dark:'#0f172a'}}}}}</script>
  <title>Partite</title>

  <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
  <link rel="manifest" href="./assets/img/favicon/site.webmanifest">

  <link rel="stylesheet" href="./custom.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* Fasi senza lampeggio del LIVE */
    .match-status.halftime { color: #d97706; animation: none; }
    .match-status.shootout { color: #7c3aed; animation: none; }
    .match-status.extratime { color: #16a34a; animation: none; }
    .shootout-score-inline { color: #7c3aed; font-weight: 800; font-size: .85em; }
  </style>
</head>

<body class="bg-slate-50">

<header class="navbar">
  <div class="logo">
    <a href="/" class="logo-link">
      <img src="/assets/img/wildcard_logo.png" alt="Torneo Wildcard" class="logo-img">
      <span>WILDCARD</span>
    </a>
  </div>

  <nav>
    <a href="matches.html"><i class="fa-solid fa-calendar"></i> <span class="nav-label">Partite</span></a>
    <a href="standing.html"><i class="fa-solid fa-ranking-star"></i> <span class="nav-label">Classifiche</span></a>
    <a href="players.html"><i class="fa-solid fa-user"></i> <span class="nav-label">Giocatori</span></a>
    <a href="teams.html"><i class="fa-solid fa-users"></i> <span class="nav-label">Squadre</span></a>
    <a href="bar.html"><i class="fa-solid fa-beer-mug-empty"></i> <span class="nav-label">Chiosco</span></a>
  </nav>
</header>

<div class="container">
  <h1>⚽ Calendario Partite</h1>

  <div id="matches-container">
    <p>Caricamento...</p>
  </div>
</div>

<script>
let matchesTimerInterval = null;

async function loadMatches() {
  try {
    const res = await fetch('/matches');
    const matches = await res.json();

    const container = document.getElementById('matches-container');
    container.innerHTML = '';

    matches.forEach(matchData => {
      startMatchesTimers();
      container.innerHTML += `
        <div class="match-card clickable" onclick="goToMatch(${matchData.id})">

          <div class="match-header">
            <span>${formatDate(matchData.match_date)}</span>

            <span class="match-group">${matchData.group_name}</span>
          </div>

          <div class="match-teams">

            <div class="team home">
              <img src="${getTeamLogo(matchData.home_team_name)}" onerror="this.style.display='none'">
              <span class="team-name">${formatTeamName(matchData.home_team_name)}</span>
            </div>

            <div class="vs">
              ${renderScore(matchData)}
            </div>

            <div class="team away">
              <span class="team-name">${formatTeamName(matchData.away_team_name)}</span>
              <img src="${getTeamLogo(matchData.away_team_name)}" onerror="this.style.display='none'">
            </div>

          </div>

          <div class="match-status ${statusClass(matchData)}">
            ${renderStatus(matchData)}
            ${isRunning(matchData)
              ? `<span class="live-timer-inline">⏱ <span class="match-list-timer" data-started-at="${matchData.started_at}">00:00</span></span>`
              : ''
            }
          </div>

        </div>
      `;
    });

  } catch (err) {
    console.error(err);
  }
}

function goToMatch(id) {
  window.location.href = `match.html?id=${id}`;
}

function formatDate(date) {
  const d = new Date(date);
  return d.toLocaleDateString('it-IT') + ' - ' +
         d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}

function formatTeamName(name) {
  if (!name) return '';
  return name
    .split(' ')
    .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
    .join(' ');
}

function getTeamLogo(name) {
  return `/assets/storage/teams/${name.toLowerCase().replace(/\s+/g,'_')}_logo.png`;
}

function renderScore(match) {
  if (match.status === 'finished' || match.status === 'live') {
    const base = `${match.home_score || 0} - ${match.away_score || 0}`;
    if (hadShootout(match)) {
      return `${base} <span class="shootout-score-inline">(${match.home_shootout_score || 0}-${match.away_shootout_score || 0})</span>`;
    }
    return base;
  }

  return 'VS';
}

function hadShootout(match) {
  return match.phase === 'shootout' ||
         (Number(match.home_shootout_score || 0) + Number(match.away_shootout_score || 0)) > 0;
}

function statusClass(match) {
  if (match.status === 'live' && match.phase === 'halftime') return 'halftime';
  if (match.status === 'live' && match.phase === 'shootout') return 'shootout';
  if (match.status === 'live' && match.phase === 'extra_time') return 'extratime';
  return match.status;
}

function isRunning(match) {
  return match.status === 'live' &&
         (match.phase === 'first_half' || match.phase === 'second_half');
}

function renderStatus(match) {
  const status = match.status;
  const phase  = match.phase;

  if (status === 'live') {
    switch (phase) {
      case 'first_half':  return '🔴 LIVE · 1° Tempo';
      case 'halftime':    return '⏸ Intervallo';
      case 'second_half': return '🔴 LIVE · 2° Tempo';
      case 'extra_time':  return '⚽ Supplementari';
      case 'shootout':    return '🥅 Shotout';
      default:            return '🔴 LIVE';
    }
  }

  switch (status) {
    case 'scheduled': return '🕒 In programma';
    case 'finished':  return hadShootout(match) ? '✅ Terminata (dopo shotout)' : '✅ Terminata';
    default:          return status;
  }
}

function startMatchesTimers() {
  if (matchesTimerInterval) clearInterval(matchesTimerInterval);

  updateMatchesTimers();
  matchesTimerInterval = setInterval(updateMatchesTimers, 1000);
}

function updateMatchesTimers() {
  document.querySelectorAll('.match-list-timer').forEach(el => {
    el.textContent = getTimerText(el.dataset.startedAt);
  });
}

function getTimerText(startedAtValue) {
  if (!startedAtValue) return '00:00';

  const startedAt = new Date(startedAtValue);
  const now = new Date();
  const diff = Math.max(0, Math.floor((now - startedAt) / 1000));

  const minutes = String(Math.floor(diff / 60)).padStart(2, '0');
  const seconds = String(diff % 60).padStart(2, '0');

  return `${minutes}:${seconds}`;
}

loadMatches();
</script>

</body>
</html>

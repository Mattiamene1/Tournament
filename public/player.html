<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{brand:{yellow:'#facc15',blue:'#1d4ed8',green:'#16a34a',dark:'#0f172a'}}}}}</script><title>Giocatore</title>

    <link rel="apple-touch-icon" sizes="180x180" href="./assets/storage/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/storage/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/storage/favicon/favicon-16x16.png">
    <link rel="manifest" href="./assets/storage/favicon/site.webmanifest">

    <link rel="stylesheet" href="./custom.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-slate-50">

<div class="container">
  <!-- <a href="teams.html" class="back">← Torna alle squadre</a> -->
  <div id="player-container">
    <p>Caricamento player...</p>
  </div>

</div>

<script>

  let logged = false;
  const params = new URLSearchParams(window.location.search);
  const playerId = params.get('id');

  async function checkAuth() {
    try {
      const res = await fetch('/me');
      const data = await res.json();
      logged = data.logged;
    } catch {
      logged = false;
    }
  }

  async function loadPlayer() {
    try {
      const res = await fetch(`/players/${playerId}`);
      const p = await res.json();

      const teamRes = await fetch(`/teams/${p.team_id}`);
      const team = await teamRes.json();

      const eventsRes = await fetch('/match-events');
      const events = await eventsRes.json();

      const goals = events.filter(e =>
        String(e.player_id) === String(playerId) &&
        (e.event_type === 'goal' || e.event_type === 'bonus')
      ).length;

      const assists = events.filter(e =>
        String(e.assist_player_id) === String(playerId)
      ).length;

      const container = document.getElementById('player-container');

      container.innerHTML = `
        <div class="player-layout">

          <div class="player-card">

            <h1>${p.first_name} ${p.last_name}</h1>

            <div class="player-meta">
              <div class="team-box">
                <img src="/assets/storage/teams/${team.name.toLowerCase().replace(/\s+/g,'_')}_logo.png"
                    alt="${team.name}">
                <span>${team.name}</span>
              </div>

              <div class="player-info">
                <p>
                  <strong>Ruolo:</strong>
                  <span>${p.role}</span>
                </p>

                ${
                  p.role !== 'PRE'
                    ? `
                    <p>
                      <strong>Numero:</strong>
                      <span>
                        <span class="shirt-badge">
                          <i class="fa-solid fa-shirt"></i>
                          <span class="shirt-number">${p.shirt_number}</span>
                        </span>
                      </span>
                    </p>
                    `
                    : ''
                }
                ${
                  logged
                    ? `<span class="player-rating">
                        ${renderStars(p.rating)}
                      </span>`
                    : ''
                }
              </div>
            </div>

            <div class="player-stats">
              <div class="stat-box">
                <span class="stat-number">${goals}</span>
                <span class="stat-label">Gol</span>
              </div>

              <div class="stat-box">
                <span class="stat-number">${assists}</span>
                <span class="stat-label">Assist</span>
              </div>
            </div>

          </div>

          <div class="player-image" id="player-image-box">
            <img
              src="/assets/storage/players/${p.id}.png"
              alt="${p.first_name} ${p.last_name}"
              onerror="
                this.onerror=null;
                ${
                  logged
                    ? `showUploadPlayerPhotoButton(${p.id})`
                    : `this.src='/assets/storage/players/default.png'`
                };
              "
            >
          </div>

        </div>
      `;

    } catch (err) {
      console.error(err);

      document.getElementById('player-container').innerHTML =
        `<p style="color:red;">Errore nel caricamento player</p>`;
    }
  }

  function renderStars(rating) {
    rating = Number.parseInt(rating);

    return Array.from({ length: rating })
      .map(() => `<i class="fa-solid fa-star"></i>`)
      .join('');
  }

  function showUploadPlayerPhotoButton(id) {
    console.log("Photo not found")
    const box = document.getElementById('player-image-box');

    box.innerHTML = `
      <button class="upload-player-photo-btn" onclick="uploadPlayerPhoto(${id})">
        <i class="fa-solid fa-upload"></i>
        Carica foto giocatore
      </button>
    `;
  }

  async function uploadPlayerPhoto(id) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';

    input.onchange = async () => {
      const file = input.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('photo', file);

      const res = await fetch(`/players/${id}/photo`, {
        method: 'POST',
        body: formData
      });

      if (!res.ok) {
        alert('Errore caricamento foto');
        return;
      }

      await loadPlayer();
    };

    input.click();
  }

  (async () => {
    await checkAuth();
    loadPlayer();
  })();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{brand:{yellow:'#facc15',blue:'#1d4ed8',green:'#16a34a',dark:'#0f172a'}}}}}</script><title>Giocatore</title>

    <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
    <link rel="manifest" href="./assets/img/favicon/site.webmanifest">

    <link rel="stylesheet" href="./custom.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
      /* Controllo per caricare/cambiare la foto, sovrapposto all'immagine */
      .player-image { position: relative; }
      .change-photo-btn {
        position: absolute;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 18px;
        border: 0;
        border-radius: 999px;
        background: rgba(15, 23, 42, .82);
        color: #fff;
        font-family: 'Barlow', system-ui, sans-serif;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow: 0 6px 20px rgba(15, 23, 42, .25);
        transition: background .18s ease, transform .18s ease;
      }
      .change-photo-btn:hover {
        background: #1d4ed8;
        transform: translateX(-50%) translateY(-2px);
      }
      .change-photo-btn:focus-visible {
        outline: 2px solid #facc15;
        outline-offset: 2px;
      }
      @media (prefers-reduced-motion: reduce) {
        .change-photo-btn { transition: none; }
        .change-photo-btn:hover { transform: translateX(-50%); }
      }
    </style>
</head>

<body class="bg-slate-50">

<div class="container">
  <!-- <a href="teams.html" class="back">← Torna alle squadre</a> -->
  <div id="player-container">
    <p>Caricamento player...</p>
  </div>

</div>

<script>

  let logged = false;
  let cacheBust = '';                // aggiornato dopo un upload per evitare cache
  const params = new URLSearchParams(window.location.search);
  const playerId = params.get('id');

  async function checkAuth() {
    try {
      const res = await fetch('/me');
      const data = await res.json();
      logged = data.logged;
    } catch {
      logged = false;
    }
  }

  async function loadPlayer() {
    try {
      const res = await fetch(`/players/${playerId}`);
      const p = await res.json();

      let team = null;
      if (p.team_id) {
        const teamRes = await fetch(`/teams/${p.team_id}`);
        if (teamRes.ok) team = await teamRes.json();
      }

      const eventsRes = await fetch('/match-events');
      const events = await eventsRes.json();

      const goals = events.filter(e =>
        String(e.player_id) === String(playerId) &&
        (e.event_type === 'goal' || e.event_type === 'bonus')
      ).length;

      const assists = events.filter(e =>
        String(e.assist_player_id) === String(playerId)
      ).length;

      const container = document.getElementById('player-container');

      container.innerHTML = `
        <div class="player-layout">

          <div class="player-card">

            <h1>${p.first_name} ${p.last_name}</h1>

            <div class="player-meta">
              ${
                team
                  ? `<div class="team-box team-link" onclick="goToTeam(${team.id})" title="Vai alla squadra">
                <img src="/assets/storage/teams/${team.name.toLowerCase().replace(/\s+/g,'_')}_logo.png"
                    alt="${team.name}">
                <span>${team.name}</span>
              </div>`
                  : `<div class="team-box">
                <span>Nessuna squadra</span>
              </div>`
              }

              <div class="player-info">
                <p>
                  <strong>Ruolo:</strong>
                  <span>${p.role}</span>
                </p>

                ${
                  p.role !== 'PRE'
                    ? `
                    <p>
                      <strong>Numero:</strong>
                      <span>
                        <span class="shirt-badge">
                          <i class="fa-solid fa-shirt"></i>
                          <span class="shirt-number">${p.shirt_number}</span>
                        </span>
                      </span>
                    </p>
                    `
                    : ''
                }
              </div>
            </div>

            <div class="player-stats">
              <div class="stat-box">
                <span class="stat-number">${goals}</span>
                <span class="stat-label">Gol</span>
              </div>

              <div class="stat-box">
                <span class="stat-number">${assists}</span>
                <span class="stat-label">Assist</span>
              </div>
            </div>

          </div>

          <div class="player-image" id="player-image-box">
            <img
              id="player-photo"
              src="/assets/storage/players/${p.id}.png${cacheBust}"
              alt="${p.first_name} ${p.last_name}"
              onload="onPhotoLoaded()"
              onerror="onPhotoError()"
            >
          </div>

        </div>
      `;

    } catch (err) {
      console.error(err);

      document.getElementById('player-container').innerHTML =
        `<p style="color:red;">Errore nel caricamento player</p>`;
    }
  }

  // Foto presente e caricata correttamente → se loggato, mostra "Cambia foto"
  function onPhotoLoaded() {
    if (logged) addPhotoButton('Cambia foto');
  }

  // Foto mancante → fallback al default e, se loggato, mostra "Carica foto"
  function onPhotoError() {
    const img = document.getElementById('player-photo');
    if (img) {
      img.onerror = null;
      img.src = '/assets/storage/players/default.png';
    }
    if (logged) addPhotoButton('Carica foto');
  }

  // Inserisce (una sola volta) il pulsante sovrapposto all'immagine
  function addPhotoButton(label) {
    const box = document.getElementById('player-image-box');
    if (!box || box.querySelector('.change-photo-btn')) return;

    const btn = document.createElement('button');
    btn.className = 'change-photo-btn';
    btn.type = 'button';
    btn.innerHTML = `<i class="fa-solid fa-camera"></i><span>${label}</span>`;
    btn.addEventListener('click', () => uploadPlayerPhoto(playerId));
    box.appendChild(btn);
  }

  function goToTeam(id) {
    if (id === undefined || id === null) return;
    window.location.href = `team.html?id=${id}`;
  }

  async function uploadPlayerPhoto(id) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';

    input.onchange = async () => {
      const file = input.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('photo', file);

      const res = await fetch(`/players/${id}/photo`, {
        method: 'POST',
        body: formData
      });

      if (!res.ok) {
        alert('Errore caricamento foto');
        return;
      }

      cacheBust = `?t=${Date.now()}`;   // forza il refresh dell'immagine
      await loadPlayer();
    };

    input.click();
  }

  (async () => {
    await checkAuth();
    loadPlayer();
  })();
</script>

</body>
</html>

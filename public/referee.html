<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{brand:{yellow:'#facc15',blue:'#1d4ed8',green:'#16a34a',dark:'#0f172a'}}}}}</script><title>Arbitro</title>

  <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
  <link rel="manifest" href="./assets/img/favicon/site.webmanifest">

  <link rel="stylesheet" href="./custom.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* Controllo per caricare/cambiare la foto, sovrapposto all'immagine */
    .player-image { position: relative; }
    .change-photo-btn {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border: 0;
      border-radius: 999px;
      background: rgba(15, 23, 42, .82);
      color: #fff;
      font-family: 'Barlow', system-ui, sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 6px 20px rgba(15, 23, 42, .25);
      transition: background .18s ease, transform .18s ease;
    }
    .change-photo-btn:hover {
      background: #1d4ed8;
      transform: translateX(-50%) translateY(-2px);
    }
    .change-photo-btn:focus-visible {
      outline: 2px solid #facc15;
      outline-offset: 2px;
    }
    @media (prefers-reduced-motion: reduce) {
      .change-photo-btn { transition: none; }
      .change-photo-btn:hover { transform: translateX(-50%); }
    }
  </style>
</head>

<body class="bg-slate-50">

<div class="container">
  <div id="referee-container">
    <p>Caricamento arbitro...</p>
  </div>
</div>

<script>
  let logged = false;
  let cacheBust = '';                // aggiornato dopo un upload per evitare cache
  const params     = new URLSearchParams(window.location.search);
  const refereeId  = params.get('id');

  async function checkAuth() {
    try {
      const res  = await fetch('/me');
      const data = await res.json();
      logged = data.logged;
    } catch {
      logged = false;
    }
  }

  async function loadReferee() {
    try {
      const [refRes, matchesRes, eventsRes] = await Promise.all([
        fetch(`/referees/${refereeId}`),
        fetch('/matches'),
        fetch('/match-events')
      ]);

      const r       = await refRes.json();
      const matches = await matchesRes.json();
      const events  = await eventsRes.json();

      // Partite arbitrate
      const refereedMatches = matches.filter(m =>
        String(m.referee_id) === String(refereeId)
      );

      // Cartellini dati IN quelle partite
      const matchIds = new Set(refereedMatches.map(m => String(m.id)));

      const yellows = events.filter(e =>
        matchIds.has(String(e.match_id)) && e.event_type === 'yellow_card'
      ).length;

      const reds = events.filter(e =>
        matchIds.has(String(e.match_id)) &&
        (e.event_type === 'red_card' || e.event_type === 'second_yellow')
      ).length;

      const container = document.getElementById('referee-container');

      container.innerHTML = `
        <div class="player-layout">

          <div class="player-card">

            <h1>${r.first_name} ${r.last_name}</h1>

            <div class="player-stats">
              <div class="stat-box">
                <span class="stat-number" style="color:#facc15;">🟨</span>
                <span class="stat-number">${yellows}</span>
                <span class="stat-label">Cartellini Gialli</span>
              </div>

              <div class="stat-box">
                <span class="stat-number" style="color:#ef4444;">🟥</span>
                <span class="stat-number">${reds}</span>
                <span class="stat-label">Cartellini Rossi</span>
              </div>
            </div>

            ${refereedMatches.length ? `
              <div style="margin-top: 16px;">
                  <h3 style="font-size:16px; opacity:.6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px;">
                    <img src="/assets/svg/whistle.svg" style="width:28px; height:28px; filter:invert(1); opacity:.7;">
                    Partite Arbitrate (${refereedMatches.length})
                  </h3>
                ${refereedMatches.map(m => `
                  <div class="player-link"
                       onclick="window.location.href='match.html?id=${m.id}'"
                       style="display:flex; align-items:center; justify-content:space-between;
                              padding:8px 0; border-bottom:1px solid rgba(255,255,255,.08);
                              font-size:14px;">
                    <span style="opacity:.7;">${formatDate(m.match_date)}</span>
                    <span>
                      ${formatTeamName(m.home_team_name)}
                      <strong style="color:#facc15; margin:0 6px;">
                        ${m.status !== 'scheduled' ? `${m.home_score ?? 0} - ${m.away_score ?? 0}` : 'vs'}
                      </strong>
                      ${formatTeamName(m.away_team_name)}
                    </span>
                  </div>
                `).join('')}
              </div>
            ` : ''}

          </div>

          <div class="player-image" id="referee-image-box">
            <img
              id="referee-photo"
              src="/assets/storage/referees/${r.id}.png${cacheBust}"
              alt="${r.first_name} ${r.last_name}"
              onload="onPhotoLoaded()"
              onerror="onPhotoError()"
            >
          </div>

        </div>
      `;

    } catch (err) {
      console.error(err);
      document.getElementById('referee-container').innerHTML =
        `<p style="color:red;">Errore nel caricamento arbitro</p>`;
    }
  }

  // Foto presente e caricata correttamente → se loggato, mostra "Cambia foto"
  function onPhotoLoaded() {
    if (logged) addPhotoButton('Cambia foto');
  }

  // Foto mancante → fallback al default e, se loggato, mostra "Carica foto"
  function onPhotoError() {
    const img = document.getElementById('referee-photo');
    if (img) {
      img.onerror = null;
      img.src = '/assets/storage/players/default.png';
    }
    if (logged) addPhotoButton('Carica foto');
  }

  // Inserisce (una sola volta) il pulsante sovrapposto all'immagine
  function addPhotoButton(label) {
    const box = document.getElementById('referee-image-box');
    if (!box || box.querySelector('.change-photo-btn')) return;

    const btn = document.createElement('button');
    btn.className = 'change-photo-btn';
    btn.type = 'button';
    btn.innerHTML = `<i class="fa-solid fa-camera"></i><span>${label}</span>`;
    btn.addEventListener('click', () => uploadRefereePhoto(refereeId));
    box.appendChild(btn);
  }

  async function uploadRefereePhoto(id) {
    const input    = document.createElement('input');
    input.type     = 'file';
    input.accept   = 'image/*';
    input.onchange = async () => {
      const file = input.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('photo', file);

      const res = await fetch(`/referees/${id}/photo`, {
        method: 'POST',
        body: formData
      });

      if (!res.ok) { alert('Errore caricamento foto'); return; }

      cacheBust = `?t=${Date.now()}`;   // forza il refresh dell'immagine
      await loadReferee();
    };
    input.click();
  }

  function formatDate(date) {
    const d = new Date(date);
    return d.toLocaleDateString('it-IT') + ' - ' +
      d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  }

  function formatTeamName(name) {
    if (!name) return '';
    return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
  }

  (async () => {
    await checkAuth();
    await loadReferee();
  })();
</script>

</body>
</html>

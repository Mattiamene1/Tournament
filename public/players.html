<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{brand:{yellow:'#facc15',blue:'#1d4ed8',green:'#16a34a',dark:'#0f172a'}}}}}</script>
    <title>Giocatori</title>

    <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
    <link rel="manifest" href="./assets/img/favicon/site.webmanifest">

    <link rel="stylesheet" href="./custom.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<header class="navbar">
    <div class="logo">
        <a href="/" class="logo-link">
            <img src="/assets/img/wildcard_logo.png" alt="Torneo Wildcard" class="logo-img">
            <span>WILDCARD</span>
        </a>
    </div>

    <nav>
        <a href="matches.html"><i class="fa-solid fa-calendar"></i> <span class="nav-label">Partite</span></a>
        <a href="standing.html"><i class="fa-solid fa-ranking-star"></i> <span class="nav-label">Classifiche</span></a>
        <a class="active" href="players.html"><i class="fa-solid fa-user"></i> <span class="nav-label">Giocatori</span></a>
        <a href="teams.html"><i class="fa-solid fa-users"></i> <span class="nav-label">Squadre</span></a>
        <a href="bar.html"><i class="fa-solid fa-beer-mug-empty"></i> <span class="nav-label">Chiosco</span></a>
    </nav>
</header>

<div class="container">

    <div class="page-header-with-action">
        <h1>👤 Giocatori</h1>

        <button id="toggle-create-player-btn" class="team-edit-toggle hidden" onclick="toggleCreatePlayer()">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div id="create-player-box" class="admin-box hidden">
        <h3><i class="fa-solid fa-plus"></i> Crea giocatore</h3>

        <div class="admin-grid">

            <div class="admin-field">
                <label>Nome *</label>
                <input id="player-first-name" placeholder="Es. Mario">
            </div>

            <div class="admin-field">
                <label>Cognome *</label>
                <input id="player-last-name" placeholder="Es. Rossi">
            </div>

            <div class="admin-field">
                <label>Ruolo *</label>
                <select id="player-role">
                <option value="POR">Portiere</option>
                <option value="DIF">Difensore</option>
                <option value="CEN">Centrocampista</option>
                <option value="ATT">Attaccante</option>
                <option value="PRE">Presidente</option>
                </select>
            </div>

            <div class="admin-field">
                <label>Numero maglia *</label>
                <input id="player-shirt-number" type="number" min="0" placeholder="Es. 10">
            </div>

            <div class="admin-field">
                <label>Squadra opzionale</label>

                <div style="display:flex; align-items:center; gap:10px;">
                    <img id="selected-team-logo" src="" style="width:38px; height:38px; object-fit:contain; display:none;">
                    <select id="player-team" onchange="updateSelectedTeamLogo()">
                        <option value="">Nessuna squadra</option>
                    </select>
                </div>
            </div>

            <div class="admin-field">
                <label>Foto giocatore</label>
                <input id="player-photo" type="file" accept="image/*" capture="environment">
            </div>

            <div class="admin-field">
                <button onclick="createPlayer()">
                    <i class="fa-solid fa-save"></i> Crea giocatore
                </button>
            </div>

        </div>
    </div>

    <div id="players-list-header"></div>
    <div id="players-container">
        <p>Caricamento giocatori...</p>
    </div>

</div>

<script>
  let logged = false;
  let createPlayerMode = false;
  let teams   = [];
  let players = [];

  /* ── Auth ──────────────────────────────────────────────────── */
  async function checkAuth() {
    try {
      const res  = await fetch('/me');
      const data = await res.json();
      logged = data.logged;

      const btn = document.getElementById('toggle-create-player-btn');
      btn.classList.toggle('hidden', !logged);
    } catch {
      logged = false;
    }
  }

  /* ── Load page data ────────────────────────────────────────── */
  async function loadPage() {
    try {
      const [teamsRes, playersRes] = await Promise.all([
        fetch('/teams'),
        fetch('/players')
      ]);

      teams   = await teamsRes.json();
      players = await playersRes.json();

      renderTeamSelect();
      renderPlayers();
    } catch (err) {
      console.error(err);
      document.getElementById('players-container').innerHTML =
        '<p style="color:red;">Errore nel caricamento giocatori</p>';
    }
  }

  /* ── Create-player toggle ──────────────────────────────────── */
  function toggleCreatePlayer() {
    createPlayerMode = !createPlayerMode;

    const box  = document.getElementById('create-player-box');
    const icon = document.querySelector('#toggle-create-player-btn i');

    box.classList.toggle('hidden', !createPlayerMode);
    icon.className = createPlayerMode ? 'fa-solid fa-xmark' : 'fa-solid fa-plus';
  }

  function renderTeamSelect() {
    const select = document.getElementById('player-team');
    select.innerHTML = `
      <option value="">Nessuna squadra</option>
      ${teams.map(t => `
        <option value="${t.id}" data-logo="${getTeamLogo(t.name)}">
          ${formatTeamName(t.name)}
        </option>
      `).join('')}
    `;
    updateSelectedTeamLogo();
  }

  function updateSelectedTeamLogo() {
    const select   = document.getElementById('player-team');
    const selected = select.options[select.selectedIndex];
    const logo     = selected.dataset.logo;
    const img      = document.getElementById('selected-team-logo');

    if (!logo) { img.style.display = 'none'; img.src = ''; return; }

    img.src          = logo;
    img.style.display = 'block';
    img.onerror      = () => { img.style.display = 'none'; };
  }

  async function createPlayer() {
    const first_name   = document.getElementById('player-first-name').value.trim();
    const last_name    = document.getElementById('player-last-name').value.trim();
    const role         = document.getElementById('player-role').value;
    const shirt_number = document.getElementById('player-shirt-number').value;
    const team_id      = document.getElementById('player-team').value;
    const photo        = document.getElementById('player-photo').files[0];

    if (!first_name || !last_name || !role || !shirt_number) {
      alert('Compila tutti i campi obbligatori');
      return;
    }

    const formData = new FormData();
    formData.append('first_name',   first_name);
    formData.append('last_name',    last_name);
    formData.append('role',         role);
    formData.append('shirt_number', shirt_number);
    if (team_id) formData.append('team_id', team_id);
    if (photo)   formData.append('photo',   photo);

    const res  = await fetch('/players', { method: 'POST', body: formData });
    const data = await res.json().catch(() => ({}));

    if (!res.ok) { alert(data.error || 'Errore creazione giocatore'); return; }

    resetCreatePlayerForm();
    createPlayerMode = false;
    document.getElementById('create-player-box').classList.add('hidden');
    document.querySelector('#toggle-create-player-btn i').className = 'fa-solid fa-plus';

    await loadPage();
  }

  function resetCreatePlayerForm() {
    document.getElementById('player-first-name').value  = '';
    document.getElementById('player-last-name').value   = '';
    document.getElementById('player-role').value        = 'POR';
    document.getElementById('player-shirt-number').value = '';
    document.getElementById('player-team').value        = '';
    document.getElementById('player-photo').value       = '';
    updateSelectedTeamLogo();
  }

  /* ── Render players list ───────────────────────────────────── */
  function renderPlayers() {
    const container = document.getElementById('players-container');

    // Dynamic header + grid based on logged state
    const headerEl = document.getElementById('players-list-header');
    if (logged) {
      headerEl.style.cssText = 'display:grid;grid-template-columns:40% 25% 30% 5%;gap:10px;padding:8px 0 8px;border-bottom:2px solid #e2e8f0;margin-bottom:4px;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;';
      headerEl.innerHTML = '<span>Giocatore</span><span style="text-align:center">Ruolo</span><span style="text-align:right;padding-right:4%">Squadra</span><span></span>';
      container.style.setProperty('--player-cols', '40% 25% 30% 5%');
      
    } else {
      headerEl.style.cssText = 'display:grid;grid-template-columns:40% 25% 30% 5%;gap:10px;padding:8px 0 8px;border-bottom:2px solid #e2e8f0;margin-bottom:4px;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;';
      headerEl.innerHTML = '<span>Giocatore</span><span style="text-align:center">Ruolo</span><span style="text-align:right;padding-right:4%">Squadra</span><span></span>';
      container.style.setProperty('--player-cols', '40% 25% 30% 5%');
      container.classList.add('guest-mode');
    }

    if (!players.length) {
      container.innerHTML = '<p>Nessun giocatore disponibile.</p>';
      return;
    }

    const teamOptionsHtml = `
      <option value="">Nessuna squadra</option>
      ${teams.map(t => `<option value="${t.id}">${formatTeamName(t.name)}</option>`).join('')}
    `;

    const roleOptionsHtml = (current) => ['POR','DIF','CEN','ATT','PRE'].map(r =>
      `<option value="${r}" ${r === current ? 'selected' : ''}>${roleLabel(r)}</option>`
    ).join('');

    container.innerHTML = players.map(player => `
      <div class="player" id="player-row-${player.id}">

        <!-- ── Summary row ──────────────────────────────────── -->
        <span class="player-link" onclick="goToPlayer(${player.id})">
          <img
            src="/assets/storage/players/${player.id}.png"
            onerror="this.style.display='none'"
            style="width:34px; height:34px; border-radius:50%; object-fit:cover; margin-right:8px;"
          >
          ${player.role !== 'PRE'
            ? '<span class="shirt-badge"><i class="fa-solid fa-shirt"></i><span class="shirt-number">' + player.shirt_number + '</span></span>'
            : '<span class="shirt-badge shirt-badge-pre"><i class="fa-solid fa-shirt" style="color:#facc15;font-size:23px;"></i></span>'}
          ${formatPlayerName(player)}
        </span>

        <span>${roleLabel(player.role)}</span>


        ${player.team_name
          ? `<span class="player-link" onclick="goToTeam(${player.team_id})" style="display:flex; align-items:center; gap:6px;">
              <img src="${getTeamLogo(player.team_name)}" onerror="this.style.display='none'"
                    style="width:24px; height:24px; object-fit:contain;">
              ${formatTeamName(player.team_name)}
            </span>`
          : `<span>Nessuna squadra</span>`
          }

        ${logged
          ? `<span class="player-actions">
               <button
                 class="btn-edit-player"
                 id="edit-btn-${player.id}"
                 title="Modifica"
                 onclick="toggleEditPanel(${player.id}, event)">
                 <i class="fa-solid fa-pencil"></i>
               </button>
             </span>`
          : ''}

        <!-- ── Inline edit panel ─────────────────────────────── -->
        ${logged ? `
        <div class="player-edit-panel" id="edit-panel-${player.id}">
          <div class="edit-grid">

            <div class="edit-field">
              <label>Nome <span style="color:#e05252">*</span></label>
              <input id="ep-first_name-${player.id}" type="text" value="${player.first_name}" placeholder="Nome">
              <span class="field-error" id="ep-err-first_name-${player.id}">Campo obbligatorio</span>
            </div>

            <div class="edit-field">
              <label>Cognome <span style="color:#e05252">*</span></label>
              <input id="ep-last_name-${player.id}" type="text" value="${player.last_name}" placeholder="Cognome">
              <span class="field-error" id="ep-err-last_name-${player.id}">Campo obbligatorio</span>
            </div>

            <div class="edit-field">
              <label>Ruolo <span style="color:#e05252">*</span></label>
              <select id="ep-role-${player.id}" onchange="onEditRoleChange(${player.id})">
                ${roleOptionsHtml(player.role)}
              </select>
            </div>

            <div class="edit-field field-shirt-wrap" id="ep-shirt-wrap-${player.id}">
              <label>N° maglia <span style="color:#e05252">*</span></label>
              <input id="ep-shirt_number-${player.id}" type="number" min="1" max="99"
                     value="${player.shirt_number || ''}" placeholder="1–99">
              <span class="field-error" id="ep-err-shirt_number-${player.id}">Numero non valido (1–99)</span>
            </div>

            <div class="edit-field">
              <label>Squadra</label>
              <select id="ep-team-${player.id}">
                ${teamOptionsHtml.replace(
                  `value="${player.team_id}"`,
                  `value="${player.team_id}" selected`
                )}
              </select>
            </div>

          </div>

          <div class="edit-panel-actions">
            <button class="btn-save-player" id="ep-save-${player.id}"
                    onclick="savePlayerInline(${player.id})">
              <i class="fa-solid fa-check"></i> Salva
            </button>
            <button class="btn-cancel-player"
                    onclick="toggleEditPanel(${player.id})">
              Annulla
            </button>
            <span class="panel-feedback" id="ep-feedback-${player.id}"></span>
          </div>
        </div>
        ` : ''}

      </div>
    `).join('');

    /* Init shirt visibility for each player */
    if (logged) players.forEach(p => onEditRoleChange(p.id));
  }

  /* ── Toggle edit panel ─────────────────────────────────────── */
  function toggleEditPanel(id, event) {
    if (event) event.stopPropagation();

    const panel = document.getElementById(`edit-panel-${id}`);
    const btn   = document.getElementById(`edit-btn-${id}`);
    if (!panel) return;

    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('active', isOpen);

    /* Reset feedback when closing */
    if (!isOpen) clearPanelFeedback(id);
  }

  /* ── Show/hide shirt field based on role ───────────────────── */
  function onEditRoleChange(id) {
    const role = document.getElementById(`ep-role-${id}`);
    const wrap = document.getElementById(`ep-shirt-wrap-${id}`);
    if (!role || !wrap) return;
    wrap.classList.toggle('hidden', role.value === 'PRE');
  }

  /* ── Validate panel fields ─────────────────────────────────── */
  function validatePanel(id) {
    let valid = true;

    const required = [
      { field: `ep-first_name-${id}`,  err: `ep-err-first_name-${id}`,  check: v => v.trim() !== '' },
      { field: `ep-last_name-${id}`,   err: `ep-err-last_name-${id}`,   check: v => v.trim() !== '' }
    ];

    required.forEach(({ field, err, check }) => {
      const el  = document.getElementById(field);
      const eel = document.getElementById(err);
      if (!el) return;
      const ok = check(el.value);
      el.classList.toggle('invalid', !ok);
      eel.classList.toggle('visible', !ok);
      if (!ok) valid = false;
    });

    /* Shirt: required unless PRE */
    const role  = document.getElementById(`ep-role-${id}`);
    const shirt = document.getElementById(`ep-shirt_number-${id}`);
    const sErr  = document.getElementById(`ep-err-shirt_number-${id}`);
    if (role && shirt && role.value !== 'PRE') {
      const v  = Number(shirt.value);
      const ok = shirt.value !== '' && Number.isInteger(v) && v >= 1 && v <= 99;
      shirt.classList.toggle('invalid', !ok);
      sErr.classList.toggle('visible', !ok);
      if (!ok) valid = false;
    }

    return valid;
  }

  function clearPanelFeedback(id) {
    const fb = document.getElementById(`ep-feedback-${id}`);
    if (fb) { fb.textContent = ''; fb.className = 'panel-feedback'; }
    [`ep-first_name-${id}`, `ep-last_name-${id}`, `ep-shirt_number-${id}`].forEach(fid => {
      const el = document.getElementById(fid);
      if (el) el.classList.remove('invalid');
    });
    document.querySelectorAll(`#edit-panel-${id} .field-error.visible`)
      .forEach(el => el.classList.remove('visible'));
  }

  /* ── Save inline ───────────────────────────────────────────── */
  async function savePlayerInline(id) {
    if (!validatePanel(id)) return;

    const saveBtn  = document.getElementById(`ep-save-${id}`);
    const feedback = document.getElementById(`ep-feedback-${id}`);
    saveBtn.disabled = true;
    feedback.className = 'panel-feedback';

    const role = document.getElementById(`ep-role-${id}`).value;

    const body = {
      first_name:   document.getElementById(`ep-first_name-${id}`).value.trim(),
      last_name:    document.getElementById(`ep-last_name-${id}`).value.trim(),
      role,
      team_id:      document.getElementById(`ep-team-${id}`).value || null,
      shirt_number: role !== 'PRE'
                      ? (document.getElementById(`ep-shirt_number-${id}`).value || null)
                      : null
    };

    try {
      const res = await fetch(`/players/${id}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || 'Errore salvataggio');
      }

      feedback.textContent = '✓ Salvato';
      feedback.className   = 'panel-feedback ok';

      setTimeout(async () => {
        await loadPage();          /* re-render the list with updated data */
      }, 700);

    } catch (err) {
      feedback.textContent = `✗ ${err.message}`;
      feedback.className   = 'panel-feedback error';
      saveBtn.disabled = false;
    }
  }

  /* ── Helpers ───────────────────────────────────────────────── */

  function roleLabel(role) {
    return { POR:'POR', DIF:'DIF', CEN:'CEN',
             ATT:'ATT', PRE:'PRE' }[role] || role;
  }

  function formatPlayerName(p) {
    return `${p.first_name || ''} ${p.last_name || ''}`.trim();
  }

  function formatTeamName(name) {
    if (!name) return '';
    return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
  }

  function getTeamLogo(name) {
    if (!name) return '';
    return `/assets/storage/teams/${String(name).toLowerCase().trim().replace(/\s+/g,'_')}_logo.png`;
  }

  function goToPlayer(id) { window.location.href = `player.html?id=${id}`; }

  function goToTeam(id) { window.location.href = `team.html?id=${id}`; }

  /* ── Boot ──────────────────────────────────────────────────── */
  (async () => {
    await checkAuth();
    await loadPage();
  })();
</script>

</body>
</html>

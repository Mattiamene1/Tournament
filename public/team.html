<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Squadre</title>

    <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
    <link rel="manifest" href="./assets/img/favicon/site.webmanifest">

    <link rel="stylesheet" href="./custom.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<header class="navbar">
    <div class="logo">
        <img src="/assets/img/wildcard_logo.png" alt="Torneo Wildcard" class="logo-img">
        <span>WILDCARD</span>
    </div>

    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="matches.html"><i class="fa-solid fa-calendar"></i> Partite</a>
        <a href="standing.html"><i class="fa-solid fa-ranking-star"></i> Classifiche</a>
        <a href="players.html"><i class="fa-solid fa-users"></i> Giocatori</a>
        <a href="teams.html"><i class="fa-solid fa-users"></i> Squadre</a>
        <a href="bar.html"><i class="fa-solid fa-beer-mug-empty"></i> Chiosco</a>
    </nav>
</header>

<div class="container">
    <div id="team-page">
        <p>Caricamento squadra...</p>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const teamId = params.get('id');

    let logged = false;
    let rosterEditMode = false;
    let createPlayerMode = false;

    async function checkAuth() {
        try {
            const res = await fetch('/me');
            const data = await res.json();
            logged = data.logged;
        } catch {
            logged = false;
        }
    }

    async function loadTeamPage() {
        try {
            const teamRes = await fetch(`/teams/${teamId}`);
            const team = await teamRes.json();

            const playersRes = await fetch(`/players?team_id=${teamId}`);
            const players = await playersRes.json();

            const matchesRes = await fetch('/matches');
            const matches = await matchesRes.json();

            const eventsRes = await fetch('/match-events');
            const events = await eventsRes.json();

            const teamMatches = matches.filter(m =>
                String(m.home_team_id) === String(teamId) ||
                String(m.away_team_id) === String(teamId)
            );

            const stats = calculateStats(teamId, teamMatches, events, players);

            document.getElementById('team-page').innerHTML = `
                <div class="team-detail-header">
                    <img class="team-logo" src="${getTeamLogo(team.name)}" alt="${formatTeamName(team.name)}">
                    <h1>${formatTeamName(team.name)}</h1>

                    ${
                        logged
                        ? `
                        <button class="team-edit-toggle" onclick="toggleTeamEdit()" title="Modifica squadra">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        `
                        : ''
                    }
                </div>

                ${
                    logged
                    ? `
                    <div id="team-edit-box" class="admin-box team-edit-box hidden">
                        <h3><i class="fa-solid fa-pen"></i> Modifica squadra</h3>

                        <div class="admin-grid">
                            <div class="admin-field">
                                <label>Nome squadra</label>
                                <input id="edit-team-name" value="${escapeHtml(formatTeamName(team.name))}">
                                <button onclick="updateTeamName(${team.id})">Salva nome squadra</button>
                            </div>

                            <div class="admin-field">
                                <label>Logo squadra</label>
                                <input type="file" id="logo-upload" accept="image/*">
                                <button onclick="uploadTeamLogo(${team.id})">Carica logo</button>
                            </div>

                            <div class="admin-field">
                                <label>Foto squadra</label>
                                <input type="file" id="team-photo-upload" accept="image/*">
                                <button onclick="uploadTeamPhoto(${team.id})">Carica foto squadra</button>
                            </div>
                        </div>
                    </div>
                    `
                    : ''
                }

                <div class="team-tabs">
                    <button class="tab-button active" onclick="showTab('info', this)">Info</button>
                    <button class="tab-button" onclick="showTab('matches', this)">Partite</button>
                    <button class="tab-button" onclick="showTab('roster', this)">Rosa</button>
                    <button class="tab-button" onclick="showTab('stats', this)">Stats</button>
                </div>

                <div id="info" class="tab-content active">
                    <div class="team-photo-card">
                        <img src="/assets/img/teams/${team.id}.png"
                            onerror="this.onerror=null; this.style.display='none';"
                            alt="${escapeHtml(team.name)}">
                    </div>
                </div>

                <div id="matches" class="tab-content">
                    ${renderMatches(teamMatches)}
                </div>

                <div id="roster" class="tab-content">
                    ${renderRoster(players)}
                </div>

                <div id="stats" class="tab-content">
                    ${renderStats(stats)}
                </div>
            `;

        } catch (err) {
            console.error(err);
            document.getElementById('team-page').innerHTML =
                '<p style="color:red;">Errore nel caricamento squadra</p>';
        }
    }

    function toggleTeamEdit() {
        const box = document.getElementById('team-edit-box');
        if (!box) return;
        box.classList.toggle('hidden');
    }

    function toggleRosterEdit() {
        rosterEditMode = !rosterEditMode;
        loadTeamPage().then(() => {
            const rosterBtn = [...document.querySelectorAll('.tab-button')]
                .find(btn => btn.textContent.trim() === 'Rosa');

            if (rosterBtn) showTab('roster', rosterBtn);
        });
    }

    function showTab(tabId, button) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));

        document.getElementById(tabId).classList.add('active');
        button.classList.add('active');
    }

    function renderRoster(players) {
        const grouped = groupByRole(players);

        return `
            <div class="team-card">
                <div class="roster-header">
                    <h2>Rosa</h2>

                    ${
                        logged
                        ? `
                        <div class="roster-actions">
                            <button class="team-edit-toggle roster-edit-toggle" onclick="toggleCreatePlayer()" title="Crea giocatore">
                                <i class="fa-solid ${createPlayerMode ? 'fa-xmark' : 'fa-plus'}"></i>
                            </button>

                            <button class="team-edit-toggle roster-edit-toggle" onclick="toggleRosterEdit()" title="Modifica rosa">
                                <i class="fa-solid ${rosterEditMode ? 'fa-eye' : 'fa-pen'}"></i>
                            </button>
                        </div>
                        `
                        : ''
                    }
                </div>

                ${
                    logged && createPlayerMode
                    ? `
                    <div class="create-player-box">
                        <input id="new-first-name" placeholder="Nome">
                        <input id="new-last-name" placeholder="Cognome">
                        <input id="new-shirt-number" type="number" min="1" placeholder="Numero">

                        <select id="new-role">
                            <option value="PRE">PRE</option>
                            <option value="POR">POR</option>
                            <option value="DIF">DIF</option>
                            <option value="CEN">CEN</option>
                            <option value="ATT">ATT</option>
                        </select>

                        <select id="new-rating">
                            ${[1,2,3,4,5].map(n => `
                                <option value="${n}">${n} stelle</option>
                            `).join('')}
                        </select>

                        <button onclick="createPlayer()">Crea</button>
                    </div>
                    `
                    : ''
                }
                
                ${renderRole('PRE', grouped.PRE)}
                ${renderRole('POR', grouped.POR)}
                ${renderRole('DIF', grouped.DIF)}
                ${renderRole('CEN', grouped.CEN)}
                ${renderRole('ATT', grouped.ATT)}
            </div>
        `;
    }

    function renderRole(role, players = []) {
        if (!players.length) return '';

        const labels = {
            PRE: 'Presidente 👑',
            POR: 'Portieri 🧤',
            DIF: 'Difensori 🛡️',
            CEN: 'Centrocampisti 🧠',
            ATT: 'Attaccanti 🎯'
        };

        return `
            <h3>${labels[role]}</h3>

            ${players.map(p => `
                <div class="player">
                    <span class="player-link" onclick="${logged && rosterEditMode ? '' : `goToPlayer(${p.id})`}">
                        ${
                            p.role !== 'PRE'
                            ? `
                            <span class="shirt-badge">
                                <i class="fa-solid fa-shirt"></i>
                                <span class="shirt-number">${p.shirt_number}</span>
                            </span>
                            `
                            : ''
                        }
                        ${escapeHtml(p.first_name || '')} ${escapeHtml(p.last_name || '')}
                    </span>

                    ${
                        logged && rosterEditMode
                        ? `
                        <div class="player-mini-edit">
                            ${
                                p.role !== 'PRE'
                                ? `
                                <label><i class="fa-solid fa-shirt"></i></label>
                                <input id="shirt-number-${p.id}" type="number" min="1" value="${p.shirt_number || ''}">
                                `
                                : ''
                            }

                            <label>Ruolo</label>
                            <select id="role-${p.id}">
                                <option value="PRE" ${p.role === 'PRE' ? 'selected' : ''}>PRE</option>
                                <option value="POR" ${p.role === 'POR' ? 'selected' : ''}>POR</option>
                                <option value="DIF" ${p.role === 'DIF' ? 'selected' : ''}>DIF</option>
                                <option value="CEN" ${p.role === 'CEN' ? 'selected' : ''}>CEN</option>
                                <option value="ATT" ${p.role === 'ATT' ? 'selected' : ''}>ATT</option>
                            </select>

                            <label><i class="fa-solid fa-star"></i></label>
                            <select id="rating-${p.id}">
                                ${[1,2,3,4,5].map(n => `
                                    <option value="${n}" ${Number(p.rating || 1) === n ? 'selected' : ''}>${n}</option>
                                `).join('')}
                            </select>

                            <button onclick="updatePlayer(${p.id})">Salva</button>
                        </div>
                        `
                        : logged
                        ? `
                        <div class="player-rating stars">
                            ${renderStars(p.rating)}
                            <span class="rating-number">(${Number(p.rating || 0)})</span>
                        </div>
                        `
                        : ''
                    }
                </div>
            `).join('')}
        `;
    }

    function renderMatches(matches) {
        if (!matches.length) return '<p>Nessuna partita disponibile.</p>';

        return matches.map(match => `
            <div class="match-card clickable" onclick="window.location.href='match.html?id=${match.id}'">
                <div class="match-header">
                    <span>${formatDate(match.match_date)}</span>
                    <span class="match-group">${match.group_name || ''}</span>
                </div>

                <div class="match-teams">
                    <div class="team">
                        <img src="${getTeamLogo(match.home_team_name)}">
                        <span>${formatTeamName(match.home_team_name)}</span>
                    </div>

                    <div class="vs">${renderScore(match)}</div>

                    <div class="team">
                        <span>${formatTeamName(match.away_team_name)}</span>
                        <img src="${getTeamLogo(match.away_team_name)}">
                    </div>
                </div>

                <div class="match-status ${match.status}">
                    ${renderStatus(match.status)}
                </div>
            </div>
        `).join('');
    }

    function renderStats(stats) {
        const items = [
            ['Posizione', stats.position],
            ['Punti', stats.points],
            ['Partite Giocate', stats.played],
            ['Vittorie', stats.wins],
            ['Pareggi', stats.draws],
            ['Sconfitte', stats.losses],
            ['Gol Fatti', stats.goalsFor],
            ['Gol Subiti', stats.goalsAgainst],
            ['Differenza Reti', stats.goalDifference],
            ['Ammonizioni', stats.yellowCards],
            ['Espulsioni', stats.redCards],
            ['Clean Sheet', stats.cleanSheets],
            ['Rigore Presidenziale', stats.rigorePresidenziale],
            ['Rigore Bonus', stats.rigoreBonus],
            ['Shootout Bonus', stats.shootoutBonus],
            ['Star Player', stats.starPlayer],
            ['Gol Doppio', stats.golDoppio],
            ['Capocannoniere', stats.topScorer]
        ];

        return `
            <div class="stats-grid">
                ${items.map(([label, value]) => `
                    <div class="stat-square">
                        <span class="stat-square-value">${value}</span>
                        <span class="stat-square-label">${label}</span>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function calculateStats(teamId, matches, events, players) {
        let played = 0;
        let wins = 0;
        let draws = 0;
        let losses = 0;
        let goalsFor = 0;
        let goalsAgainst = 0;
        let cleanSheets = 0;

        matches.forEach(m => {
            if (m.status !== 'finished') return;

            played++;

            const isHome = String(m.home_team_id) === String(teamId);
            const gf = isHome ? Number(m.home_score || 0) : Number(m.away_score || 0);
            const ga = isHome ? Number(m.away_score || 0) : Number(m.home_score || 0);

            goalsFor += gf;
            goalsAgainst += ga;

            if (ga === 0) cleanSheets++;

            if (gf > ga) wins++;
            else if (gf === ga) draws++;
            else losses++;
        });

        const teamEvents = events.filter(e => String(e.team_id) === String(teamId));

        const yellowCards = teamEvents.filter(e => e.event_type === 'yellow_card').length;
        const redCards = teamEvents.filter(e =>
            e.event_type === 'red_card' || e.event_type === 'second_yellow'
        ).length;

        const rigorePresidenziale = teamEvents.filter(e =>
            e.goal_type === 'Rigore Presidenziale' || e.bonus_name === 'Rigore Presidenziale'
        ).length;

        const rigoreBonus = teamEvents.filter(e =>
            e.goal_type === 'Rigore' && e.event_type === 'bonus'
        ).length;

        const shootoutBonus = teamEvents.filter(e =>
            e.goal_type === 'Shootout' || e.bonus_name === 'Shootout'
        ).length;

        const golDoppio = teamEvents.filter(e =>
            e.goal_type === 'Gol Doppio' || e.bonus_name === 'Gol Doppio'
        ).length;

        const scorerMap = {};

        teamEvents
            .filter(e => e.event_type === 'goal' || e.event_type === 'bonus')
            .forEach(e => {
                if (!e.player_id) return;
                scorerMap[e.player_id] = (scorerMap[e.player_id] || 0) + 1;
            });

        let topScorer = '-';
        let maxGoals = 0;

        Object.keys(scorerMap).forEach(playerId => {
            if (scorerMap[playerId] > maxGoals) {
                maxGoals = scorerMap[playerId];
                const p = players.find(pl => String(pl.id) === String(playerId));
                topScorer = p ? `${p.first_name} ${p.last_name}` : '-';
            }
        });

        const starPlayer = teamEvents.filter(e =>
            e.bonus_name === 'Star Player'
        ).length;

        return {
            position: '-',
            points: wins * 3 + draws,
            played,
            wins,
            draws,
            losses,
            goalsFor,
            goalsAgainst,
            goalDifference: goalsFor - goalsAgainst,
            yellowCards,
            redCards,
            cleanSheets,
            rigorePresidenziale,
            rigoreBonus,
            shootoutBonus,
            starPlayer,
            golDoppio,
            topScorer
        };
    }

    function groupByRole(players) {
        const roles = { PRE: [], POR: [], DIF: [], CEN: [], ATT: [] };

        players.forEach(p => {
            if (roles[p.role]) roles[p.role].push(p);
        });

        return roles;
    }

    function renderStars(rating) {
        const value = Number(rating || 0);

        if (value <= 0) {
            return `<span class="rating-empty">Nessuna stella</span>`;
        }

        return Array.from({ length: value })
            .map(() => `<i class="fa-solid fa-star"></i>`)
            .join('');
    }

    function renderScore(match) {
        if (match.status === 'finished' || match.status === 'live') {
            return `${match.home_score} - ${match.away_score}`;
        }

        return 'VS';
    }

    function renderStatus(status) {
        switch (status) {
            case 'scheduled': return '🕒 In programma';
            case 'live': return '🔴 LIVE';
            case 'finished': return '✅ Terminata';
            default: return status;
        }
    }

    function formatDate(date) {
        const d = new Date(date);
        return d.toLocaleDateString('it-IT') + ' - ' +
            d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }

    function formatTeamName(name) {
        if (!name) return '';

        return name
            .split(' ')
            .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
            .join(' ');
    }

    function getTeamLogo(name) {
        return `/assets/img/teams/${name.toLowerCase().replace(/\s+/g, '_')}_logo.png`;
    }

    function goToPlayer(id) {
        window.location.href = `player.html?id=${id}`;
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;');
    }

    async function updateTeamName(teamId) {
        const name = document.getElementById('edit-team-name').value.trim();

        if (!name) {
            alert('Nome squadra obbligatorio');
            return;
        }

        const res = await fetch(`/teams/${teamId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        });

        if (!res.ok) {
            alert('Errore aggiornamento squadra');
            return;
        }

        await loadTeamPage();
    }

    async function uploadTeamLogo(teamId) {
        const file = document.getElementById('logo-upload').files[0];

        if (!file) {
            alert('Seleziona un logo');
            return;
        }

        const formData = new FormData();
        formData.append('logo', file);

        const res = await fetch(`/teams/${teamId}/logo`, {
            method: 'POST',
            body: formData
        });

        if (!res.ok) {
            alert('Errore upload logo');
            return;
        }

        location.reload();
    }

    async function uploadTeamPhoto(teamId) {
        const file = document.getElementById('team-photo-upload').files[0];

        if (!file) {
            alert('Seleziona una foto');
            return;
        }

        const formData = new FormData();
        formData.append('photo', file);

        const res = await fetch(`/teams/${teamId}/photo`, {
            method: 'POST',
            body: formData
        });

        if (!res.ok) {
            alert('Errore upload foto squadra');
            return;
        }

        location.reload();
    }

    async function updatePlayer(playerId) {
        const shirt_number = Number(document.getElementById(`shirt-number-${playerId}`).value);
        const role = document.getElementById(`role-${playerId}`).value;
        const rating = Number(document.getElementById(`rating-${playerId}`).value);

        const res = await fetch(`/players/${playerId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                shirt_number,
                role,
                rating
            })
        });

        if (!res.ok) {
            alert('Errore aggiornamento giocatore');
            return;
        }

        rosterEditMode = false;

        await loadTeamPage();

        const rosterBtn = [...document.querySelectorAll('.tab-button')]
            .find(btn => btn.textContent.trim() === 'Rosa');

        if (rosterBtn) showTab('roster', rosterBtn);
    }

    function toggleCreatePlayer() {
        createPlayerMode = !createPlayerMode;
        loadTeamPage().then(() => {
            const rosterBtn = [...document.querySelectorAll('.tab-button')]
                .find(btn => btn.textContent.trim() === 'Rosa');

            if (rosterBtn) showTab('roster', rosterBtn);
        });
    }

    async function createPlayer() {
        const first_name = document.getElementById('new-first-name').value.trim();
        const last_name = document.getElementById('new-last-name').value.trim();
        const shirt_number = Number(document.getElementById('new-shirt-number').value);
        const role = document.getElementById('new-role').value;
        const rating = Number(document.getElementById('new-rating').value);

        if (!first_name || !last_name || !role) {
            alert('Nome, cognome e ruolo sono obbligatori');
            return;
        }

        const res = await fetch('/players', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                first_name,
                last_name,
                shirt_number,
                role,
                rating,
                team_id: Number(teamId)
            })
        });

        if (!res.ok) {
            alert('Errore creazione giocatore');
            return;
        }

        createPlayerMode = false;

        await loadTeamPage();

        const rosterBtn = [...document.querySelectorAll('.tab-button')]
            .find(btn => btn.textContent.trim() === 'Rosa');

        if (rosterBtn) showTab('roster', rosterBtn);
    }


    (async () => {
        await checkAuth();
        await loadTeamPage();
    })();
</script>

</body>
</html>

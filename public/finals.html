<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{brand:{yellow:'#facc15',blue:'#1d4ed8',green:'#16a34a',dark:'#0f172a'}}}}}</script><title>Tabellone Finale</title>

  <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
  <link rel="manifest" href="./assets/img/favicon/site.webmanifest">

  <link rel="stylesheet" href="./custom.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .finals-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 16px;
    }
    .finals-header h1 { margin: 0; }

    .admin-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .btn-simulate {
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #0f172a;
      color: #facc15;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: .2s;
      font-family: 'Barlow', sans-serif;
    }
    .btn-simulate:hover { background: #1e293b; transform: scale(1.02); }
    .btn-simulate:disabled { opacity: .5; cursor: not-allowed; transform: none; background: #475569; }
    .btn-simulate.btn-reset { background: #ef4444; color: #fff; }
    .btn-simulate.btn-reset:hover { background: #dc2626; }

    .bracket-status {
      margin: 0 0 20px;
      font-size: 13px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .bracket-wrapper { overflow-x: auto; padding-bottom: 24px; }

    .bracket {
      display: grid;
      grid-template-columns: 210px 48px 200px 48px 220px 48px 200px 48px 210px;
      align-items: center;
      gap: 0;
      min-width: 900px;
    }

    .col-sf-left   { display: flex; flex-direction: column; gap: 24px; }
    .col-conn-l1   { display: flex; flex-direction: column; gap: 24px; align-items: center; justify-content: center; }
    .col-qf-left   { display: flex; flex-direction: column; gap: 0; align-items: center; justify-content: center; }
    .col-conn-l2   { display: flex; align-items: center; justify-content: center; }
    .col-center    { display: flex; flex-direction: column; gap: 16px; align-items: center; }
    .col-conn-r2   { display: flex; align-items: center; justify-content: center; }
    .col-qf-right  { display: flex; flex-direction: column; gap: 0; align-items: center; justify-content: center; }
    .col-conn-r1   { display: flex; flex-direction: column; gap: 24px; align-items: center; justify-content: center; }
    .col-sf-right  { display: flex; flex-direction: column; gap: 24px; }

    .match-box {
      background: #0f172a;
      border-radius: 12px;
      padding: 12px 14px;
      width: 200px;
      cursor: pointer;
      transition: .2s;
      border: 1.5px solid #1e3a5f;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      position: relative;
    }
    .match-box:hover { border-color: #facc15; box-shadow: 0 6px 20px rgba(250,204,21,.15); transform: scale(1.02); }
    .match-box.placeholder { opacity: .5; cursor: default; }
    .match-box.placeholder:hover { border-color: #1e3a5f; transform: none; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .match-box.live     { border-color: #ef4444; box-shadow: 0 0 16px rgba(239,68,68,.2); }
    .match-box.finished { border-color: #16a34a; }

    .match-box-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .match-box-team {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 700;
      background: #ffffff;
      border-radius: 8px;
      border: none;
    }
    .match-box-team:last-child { margin-bottom: 0; }

    .match-box-team img {
      width: 22px; height: 22px;
      object-fit: contain;
      background: #f8fafc;
      border-radius: 4px;
      padding: 2px;
      flex: 0 0 22px;
      border: 1px solid #e2e8f0;
    }

    .match-box-team .team-name {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: #0f172a;
    }

    .match-box-team .team-score {
      font-size: 14px;
      font-weight: 900;
      color: #1d4ed8;
      min-width: 20px;
      text-align: right;
    }

    .match-box-team.winner .team-name { color: #16a34a; }
    .match-box-team.winner .team-score { color: #16a34a; }
    .match-box-team.placeholder-team {
      background: #1e293b;
      font-style: italic;
      font-weight: 400;
    }
    .match-box-team.placeholder-team .team-name { color: #94a3b8; }

    .match-status-badge {
      position: absolute;
      top: 8px; right: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .05em;
      padding: 2px 6px;
      border-radius: 20px;
    }
    .badge-live      { background: #ef4444; color: #fff; }
    .badge-finished  { background: #16a34a; color: #fff; }
    .badge-scheduled { background: #1e293b; color: #94a3b8; }

    .final-box {
      background: #0f172a;
      border: 2px solid #facc15;
      border-radius: 14px;
      padding: 14px;
      width: 210px;
      text-align: center;
      box-shadow: 0 0 28px rgba(250,204,21,.2);
      position: relative;
    }
    .final-box .match-box-label { color: #facc15; font-size: 11px; }
    .final-box .match-box-team  { text-align: left; }

    .third-box {
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 14px;
      padding: 14px;
      width: 210px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      position: relative;
    }
    .third-box .match-box-label { color: #64748b; font-size: 11px; }
    .third-box .match-box-team  { text-align: left; }

    .connector { width: 60px; }

    @media (max-width: 768px) {
      .bracket { min-width: 700px; }
      .match-box, .final-box, .third-box { width: 160px; padding: 10px 12px; }
      .match-box-team { font-size: 11px; }
    }
  </style>
</head>

<body class="bg-slate-50">

<header class="navbar">
  <div class="logo">
    <a href="/" class="logo-link">
      <img src="/assets/img/wildcard_logo.png" alt="Torneo Wildcard" class="logo-img">
      <span>WILDCARD</span>
    </a>
  </div>
  <nav>
    <a href="matches.html"><i class="fa-solid fa-calendar"></i> <span class="nav-label">Partite</span></a>
    <a href="standing.html"><i class="fa-solid fa-ranking-star"></i> <span class="nav-label">Classifiche</span></a>
    <a href="players.html"><i class="fa-solid fa-user"></i> <span class="nav-label">Giocatori</span></a>
    <a href="teams.html"><i class="fa-solid fa-users"></i> <span class="nav-label">Squadre</span></a>
    <a href="bar.html"><i class="fa-solid fa-beer-mug-empty"></i> <span class="nav-label">Chiosco</span></a>
  </nav>
</header>

<div class="container">

  <div class="finals-header">
    <h1>🏆 Tabellone Finale</h1>
    <div class="admin-bar" id="admin-bar"></div>
  </div>

  <div class="bracket-status" id="bracket-status"></div>

  <div class="bracket-wrapper">
    <div class="bracket" id="bracket">
      <p style="opacity:.5;">Caricamento tabellone...</p>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let logged     = false;
let allMatches = [];
let knockout   = [];   // solo partite del tabellone (round valorizzato)

/* Configurazione del tabellone (etichette + placeholder) */
const QF = [
  { slot: 'QF1', label: 'Quarto 1', home: '1° Girone A', away: '4° Girone B' },
  { slot: 'QF2', label: 'Quarto 2', home: '2° Girone B', away: '3° Girone A' },
  { slot: 'QF3', label: 'Quarto 3', home: '1° Girone B', away: '4° Girone A' },
  { slot: 'QF4', label: 'Quarto 4', home: '2° Girone A', away: '3° Girone B' },
];
const SF = [
  { slot: 'SF1', label: 'Semifinale 1', home: 'Vincente Quarto 1', away: 'Vincente Quarto 2' },
  { slot: 'SF2', label: 'Semifinale 2', home: 'Vincente Quarto 3', away: 'Vincente Quarto 4' },
];
const FINAL = { slot: 'FINAL', label: '🏆 Finale',        home: 'Vincente Semifinale 1', away: 'Vincente Semifinale 2' };
const THIRD = { slot: 'THIRD', label: '🥉 Finale 3°/4°',  home: 'Perdente Semifinale 1', away: 'Perdente Semifinale 2' };

/* ═══════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════ */
(async () => {
  await checkAuth();
  await loadData();
  renderAll();
})();

async function checkAuth() {
  try {
    const res  = await fetch('/me');
    const data = await res.json();
    logged = data.logged;
  } catch { logged = false; }
}

async function loadData() {
  const res = await fetch('/matches');
  allMatches = await res.json();
  knockout   = allMatches.filter(m => m.round);   // round valorizzato = tabellone
}

function renderAll() {
  renderControls();
  renderBracket();
}

/* ═══════════════════════════════════════════════════
   CONTROLLI ADMIN
═══════════════════════════════════════════════════ */
function renderControls() {
  const bar      = document.getElementById('admin-bar');
  const statusEl = document.getElementById('bracket-status');

  const quarters = knockout.filter(m => m.round === 'quarter');
  const semis    = knockout.filter(m => m.round === 'semi');
  const finals   = knockout.filter(m => m.round === 'final' || m.round === 'third');
  const allDone  = arr => arr.length > 0 && arr.every(m => m.status === 'finished');

  let phase = 'Tabellone non ancora generato';
  if (finals.length)        phase = 'Finali generate';
  else if (semis.length)    phase = 'Semifinali generate — completa per la finale';
  else if (quarters.length) phase = 'Quarti generati — completa per le semifinali';
  statusEl.textContent = phase;

  if (!logged) { bar.innerHTML = ''; return; }

  let btns = '';

  if (quarters.length === 0) {
    btns += `
      <button class="btn-simulate" onclick="genQuarters()">
        <i class="fa-solid fa-wand-magic-sparkles"></i> Chiudi gironi e genera quarti
      </button>`;
  } else if (semis.length === 0) {
    const ok = quarters.length >= 4 && allDone(quarters);
    btns += `
      <button class="btn-simulate" onclick="genSemis()" ${ok ? '' : 'disabled'}
              title="${ok ? '' : 'Completa tutti i quarti'}">
        <i class="fa-solid fa-forward"></i> Genera semifinali
      </button>`;
  } else if (finals.length === 0) {
    const ok = semis.length >= 2 && allDone(semis);
    btns += `
      <button class="btn-simulate" onclick="genFinals()" ${ok ? '' : 'disabled'}
              title="${ok ? '' : 'Completa le semifinali'}">
        <i class="fa-solid fa-trophy"></i> Genera finale e finalina
      </button>`;
  }

  if (knockout.length) {
    btns += `
      <button class="btn-simulate btn-reset" onclick="resetBracket()">
        <i class="fa-solid fa-xmark"></i> Svuota tabellone
      </button>`;
  }

  bar.innerHTML = btns;
}

/* ═══════════════════════════════════════════════════
   AZIONI
═══════════════════════════════════════════════════ */
async function genQuarters() { await postFinals('/matches/finals/quarters'); }
async function genSemis()    { await postFinals('/matches/finals/semifinals'); }
async function genFinals()   { await postFinals('/matches/finals/finals'); }

async function postFinals(url) {
  const res  = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  });
  const data = await res.json().catch(() => ({}));

  if (!res.ok || data.success === false) {
    alert(data.error || 'Operazione non riuscita');
    return;
  }

  await loadData();
  renderAll();
}

async function resetBracket() {
  if (!confirm('Svuotare tutto il tabellone? Tutte le partite della fase finale verranno eliminate.')) return;

  const res  = await fetch('/matches/finals', { method: 'DELETE' });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) { alert(data.error || 'Errore'); return; }

  await loadData();
  renderAll();
}

/* ═══════════════════════════════════════════════════
   RENDER BRACKET
═══════════════════════════════════════════════════ */
function renderBracket() {
  document.getElementById('bracket').innerHTML = `
    <div class="col-sf-left">
      ${renderBox(QF[0], 'match-box')}
      ${renderBox(QF[1], 'match-box')}
    </div>
    <div class="col-conn-l1">${renderConnectorRight()}${renderConnectorRight()}</div>

    <div class="col-qf-left">${renderBox(SF[0], 'match-box')}</div>
    <div class="col-conn-l2">${renderConnectorRight()}</div>

    <div class="col-center">
      ${renderBox(FINAL, 'final-box')}
      ${renderBox(THIRD, 'third-box')}
    </div>

    <div class="col-conn-r2">${renderConnectorLeft()}</div>
    <div class="col-qf-right">${renderBox(SF[1], 'match-box')}</div>

    <div class="col-conn-r1">${renderConnectorLeft()}${renderConnectorLeft()}</div>
    <div class="col-sf-right">
      ${renderBox(QF[2], 'match-box')}
      ${renderBox(QF[3], 'match-box')}
    </div>
  `;
}

function matchBySlot(slot) {
  return knockout.find(m => m.slot === slot) || null;
}

function renderBox(cfg, baseClass) {
  const m = matchBySlot(cfg.slot);
  const label = `<div class="match-box-label">${cfg.label}</div>`;

  if (!m) {
    return `
      <div class="${baseClass} placeholder">
        ${label}
        ${renderTeamRow(null, null, false, cfg.home)}
        ${renderTeamRow(null, null, false, cfg.away)}
      </div>`;
  }

  const showScore = m.status !== 'scheduled';
  const hs = showScore ? Number(m.home_score || 0) : null;
  const as = showScore ? Number(m.away_score || 0) : null;

  const wl       = m.status === 'finished' ? winnerLoser(m) : null;
  const homeWin  = wl && String(wl.winner) === String(m.home_team_id);
  const awayWin  = wl && String(wl.winner) === String(m.away_team_id);

  return `
    <div class="${baseClass} ${m.status}" style="cursor:pointer"
         onclick="window.location.href='match.html?id=${m.id}'">
      ${statusBadge(m.status)}
      ${label}
      ${renderTeamRow(m.home_team_name, hs, homeWin, null)}
      ${renderTeamRow(m.away_team_name, as, awayWin, null)}
    </div>`;
}

function renderTeamRow(teamName, score, isWinner, placeholderText) {
  if (!teamName) {
    return `
      <div class="match-box-team placeholder-team">
        <span class="team-name">${placeholderText || '?'}</span>
      </div>`;
  }

  return `
    <div class="match-box-team ${isWinner ? 'winner' : ''}">
      <img src="${getTeamLogo(teamName)}" onerror="this.style.display='none'">
      <span class="team-name">${formatTeamName(teamName)}</span>
      ${score !== null ? `<span class="team-score">${score}</span>` : ''}
    </div>`;
}

function statusBadge(status) {
  if (status === 'live')     return `<span class="match-status-badge badge-live">🔴 LIVE</span>`;
  if (status === 'finished') return `<span class="match-status-badge badge-finished">✅</span>`;
  return `<span class="match-status-badge badge-scheduled">🕒</span>`;
}

/* Vincitore/perdente di una partita (gestisce anche i rigori) */
function winnerLoser(m) {
  const hs = Number(m.home_score || 0);
  const as = Number(m.away_score || 0);
  if (hs > as) return { winner: m.home_team_id, loser: m.away_team_id };
  if (as > hs) return { winner: m.away_team_id, loser: m.home_team_id };

  const hso = Number(m.home_shootout_score || 0);
  const aso = Number(m.away_shootout_score || 0);
  if (hso > aso) return { winner: m.home_team_id, loser: m.away_team_id };
  if (aso > hso) return { winner: m.away_team_id, loser: m.home_team_id };

  return null;
}

/* ── Connettori SVG ── */
function renderConnectorRight() {
  return `
    <svg class="connector" height="40" viewBox="0 0 60 40" fill="none">
      <path d="M0 20 H60" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 3"/>
    </svg>`;
}

function renderConnectorLeft() {
  return `
    <svg class="connector" height="40" viewBox="0 0 60 40" fill="none">
      <path d="M60 20 H0" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 3"/>
    </svg>`;
}

/* ── Utils ── */
function getTeamLogo(name) {
  if (!name) return '';
  return `/assets/storage/teams/${String(name).toLowerCase().trim().replace(/\s+/g,'_')}_logo.png`;
}

function formatTeamName(name) {
  if (!name) return '';
  return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}
</script>

</body>
</html>

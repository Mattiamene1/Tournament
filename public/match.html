<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{brand:{yellow:'#facc15',blue:'#1d4ed8',green:'#16a34a',dark:'#0f172a'}}}}}</script>
  <title>Partita</title>
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
  <link rel="manifest" href="./assets/img/favicon/site.webmanifest">

  <link rel="stylesheet" href="./custom.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* Stati aggiuntivi (intervallo / rigori) — animazione "blink" disattivata */
    .match-status.halftime { color: #d97706; animation: none; }
    .match-status.shootout { color: #7c3aed; animation: none; }

    .shootout-score-inline { color: #7c3aed; font-weight: 800; }

    .shootout-panel {
      margin: 16px 0;
      padding: 18px;
      border: 2px dashed #7c3aed;
      border-radius: 14px;
      background: #faf5ff;
    }
    .shootout-panel h3 {
      margin: 0 0 4px;
      color: #7c3aed;
      text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .shootout-panel .shootout-hint {
      text-align: center; font-size: 13px; opacity: .7; margin-bottom: 14px;
    }
    .shootout-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
    }
    .shootout-team { text-align: center; }
    .shootout-team .shootout-team-name { font-weight: 700; margin-bottom: 8px; }
    .shootout-team .shootout-count { font-size: 38px; font-weight: 900; color: #0f172a; }
    .shootout-controls { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
    .shootout-controls button {
      border: none; border-radius: 8px; width: 42px; height: 42px;
      font-size: 20px; font-weight: 800; cursor: pointer;
    }
    .shootout-controls .so-plus  { background: #16a34a; color: #fff; }
    .shootout-controls .so-minus { background: #e5e7eb; color: #0f172a; }
    .shootout-sep { font-size: 28px; font-weight: 900; opacity: .4; }
    .shootout-finish { margin-top: 16px; text-align: center; }

    /* Pulsanti modifica/elimina su ogni evento (solo admin) */
    .tl-card { position: relative; }
    .tl-actions {
      position: absolute;
      top: 6px;
      right: 6px;
      display: flex;
      gap: 6px;
    }
    .tl-action {
      border: none;
      border-radius: 6px;
      width: 26px;
      height: 26px;
      font-size: 12px;
      cursor: pointer;
      line-height: 1;
      opacity: .75;
      transition: opacity .15s, transform .15s;
    }
    .tl-action:hover { opacity: 1; transform: scale(1.08); }
    .tl-action.edit   { background: #e0e7ff; color: #1d4ed8; }
    .tl-action.delete { background: #fee2e2; color: #dc2626; }

    .edit-cancel-row { text-align: center; margin-top: 8px; }
    .edit-cancel-btn {
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      background: #e5e7eb;
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
    }
    .edit-cancel-btn:hover { background: #d1d5db; }
  </style>
</head>

<body class="bg-slate-50">

<header class="navbar">
  <div class="logo">
    <a href="/" class="logo-link">
      <img src="/assets/img/wildcard_logo.png" alt="Torneo Wildcard" class="logo-img">
      <span>WILDCARD</span>
    </a>
  </div>

  <nav>
    <a href="matches.html"><i class="fa-solid fa-calendar"></i> <span class="nav-label">Partite</span></a>
    <a href="standing.html"><i class="fa-solid fa-ranking-star"></i> <span class="nav-label">Classifiche</span></a>
    <a href="players.html"><i class="fa-solid fa-user"></i> <span class="nav-label">Giocatori</span></a>
    <a href="teams.html"><i class="fa-solid fa-users"></i> <span class="nav-label">Squadre</span></a>
    <a href="bar.html"><i class="fa-solid fa-beer-mug-empty"></i> <span class="nav-label">Chiosco</span></a>
  </nav>
</header>

<div class="container">
  <h1>📅 Partita</h1>

  <div id="match-page">
    <p>Caricamento partita...</p>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
// Numero di rigori per squadra in caso di pareggio.
// Cambia in 3 per "al meglio di 3", 5 per "al meglio di 5", ecc.
const SHOOTOUT_BEST_OF = 5;

const params = new URLSearchParams(window.location.search);
const matchId = params.get('id');

let logged = false;
let matchData = null;
let homePlayers = [];
let awayPlayers = [];
let bonuses = [];
let timerInterval = null;

let scheduleEditMode = false;
let eventCreateMode = false;
let editEventId = null;
let allEvents = [];

async function checkAuth() {
  try {
    const res = await fetch('/me');
    const data = await res.json();
    logged = data.logged;
  } catch {
    logged = false;
  }
}

async function loadMatchPage() {
  try {
    const matchRes = await fetch(`/matches/${matchId}`);
    matchData = await matchRes.json();

    const refRes = await fetch(`/referees/${matchData.referee_id}`);
    matchData.referee = await refRes.json();

    const homePlayersRes = await fetch(`/players?team_id=${matchData.home_team_id}`);
    homePlayers = await homePlayersRes.json();

    const awayPlayersRes = await fetch(`/players?team_id=${matchData.away_team_id}`);
    awayPlayers = await awayPlayersRes.json();

    const eventsRes = await fetch(`/match-events?match_id=${matchId}`);
    const events = await eventsRes.json();

    const bonusesRes = await fetch('/bonuses');
    bonuses = await bonusesRes.json();

    renderMatch(events);

  } catch (err) {
    console.error(err);
    document.getElementById('match-page').innerHTML =
      '<p style="color:red;">Errore nel caricamento partita</p>';
  }
}

// ── renderMatch helpers ───────────────────────────────────────────────────

function renderMatchHeader() {
  const editBtn = logged ? `
    <button class="match-datetime-edit-toggle" onclick="toggleScheduleEdit()" title="Modifica programmazione">
      <i class="fa-solid ${scheduleEditMode ? 'fa-xmark' : 'fa-pen'}"></i>
    </button>` : '';

  let stateBtns = '';
  if (logged) {
    if (matchData.status === 'scheduled') {
      stateBtns = `
        <button class="match-state-btn" onclick="startMatch()">
          <i class="fa-solid fa-play"></i> Inizia partita
        </button>`;
    } else if (matchData.status === 'live' && matchData.phase === 'first_half') {
      stateBtns = `
        <button class="match-state-btn" onclick="endFirstHalf()">
          <i class="fa-solid fa-hourglass-half"></i> Fine 1° tempo
        </button>`;
    } else if (matchData.status === 'live' && matchData.phase === 'halftime') {
      stateBtns = `
        <button class="match-state-btn" onclick="startSecondHalf()">
          <i class="fa-solid fa-play"></i> Inizia 2° tempo
        </button>`;
    } else if (matchData.status === 'live' && matchData.phase === 'second_half') {
      stateBtns = `
        <button class="match-state-btn danger" onclick="finishMatch()">
          <i class="fa-solid fa-flag-checkered"></i> Termina partita
        </button>`;
    }
    // durante 'shootout' i comandi sono nel pannello rigori dedicato
  }

  const scheduleBox = logged && scheduleEditMode ? `
    <div class="schedule-edit-box">
      <input class="match-datetime-input" id="match-date" type="datetime-local" value="${toDateTimeLocal(matchData.match_date)}">
      <button class="match-datetime-button" onclick="updateMatchDate()">Salva programmazione</button>
    </div>` : '';

  return `
    <div class="match-header match-detail-header">
      <div class="match-header-left">
        <span class="match-date">${formatDate(matchData.match_date)}</span>
        ${editBtn}
      </div>
      <div class="match-header-center">${stateBtns}</div>
      <span class="match-group">${matchData.group_name || ''}</span>
    </div>
    ${scheduleBox}`;
}

function renderMatchTeams() {
  const homeLogo = matchData.home_team_name
    ? `<img src="${getTeamLogo(matchData.home_team_name)}" onerror="this.onerror=null; this.style.display='none';">` : '';
  const awayLogo = matchData.away_team_name
    ? `<img src="${getTeamLogo(matchData.away_team_name)}" onerror="this.onerror=null; this.style.display='none';">` : '';

  return `
    <div class="match-teams">
      <div class="team home">
        <span class="team-link" onclick="goToTeam(${matchData.home_team_id})" style="display:contents;">
          ${homeLogo}
          <span class="team-name"><strong>${formatTeamName(matchData.home_team_name)}</strong></span>
        </span>
      </div>
      <div class="vs">${renderScore(matchData)}</div>
      <div class="team away">
        <span class="team-link" onclick="goToTeam(${matchData.away_team_id})" style="display:contents;">
          <span class="team-name"><strong>${formatTeamName(matchData.away_team_name)}</strong></span>
          ${awayLogo}
        </span>
      </div>
    </div>`;
}

function renderMatchStatus() {
  const phase = matchData.phase;
  const running = matchData.status === 'live' &&
                  (phase === 'first_half' || phase === 'second_half');

  const timer = running
    ? `<span class="live-timer-inline">⏱ <span id="match-timer">${getTimerText()}</span></span>` : '';

  // Punteggio rigori in corso / a fine partita ai rigori
  const shootout = (matchData.status === 'live' && phase === 'shootout')
    ? `<span class="shootout-score-inline">${matchData.home_shootout_score || 0} - ${matchData.away_shootout_score || 0}</span>`
    : '';

  // Classe CSS: durante l'intervallo/rigori non vogliamo il "blink" del live
  let statusClass = matchData.status;
  if (matchData.status === 'live' && phase === 'halftime') statusClass = 'halftime';
  if (matchData.status === 'live' && phase === 'shootout') statusClass = 'shootout';

  return `<div class="match-status ${statusClass}"><span>${renderStatus(matchData.status, phase)}</span>${timer}${shootout}</div>`;
}

function renderReferee() {
  if (!matchData.referee) return '';
  return `
    <div style="margin-top:14px; text-align:center; font-size:14px; opacity:.7; display:flex; align-items:center; justify-content:center; gap:8px;">
      <img src="/assets/svg/whistle.svg" style="width:25px; height:25px; filter:invert(1); opacity:.7;">
      <span class="event-player-link tl-player" onclick="goToReferee(${matchData.referee.id})">
        ${matchData.referee.first_name} ${matchData.referee.last_name}
      </span>
    </div>`;
}

function renderAddEventButton() {
  const inPlay = matchData.status === 'live' &&
                 (matchData.phase === 'first_half' || matchData.phase === 'second_half');
  if (!logged || !inPlay) return '';
  return `
    <div class="match-event-action">
      <button onclick="toggleEventCreate()">
        <i class="fa-solid ${eventCreateMode ? 'fa-xmark' : 'fa-plus'}"></i>
        ${eventCreateMode ? 'Chiudi evento' : 'Aggiungi evento'}
      </button>
    </div>`;
}

// ── renderMatch ───────────────────────────────────────────────────────────

function renderMatch(events) {
  allEvents = events || [];

  const inPlay = matchData.status === 'live' &&
                 (matchData.phase === 'first_half' || matchData.phase === 'second_half');
  const inShootout = matchData.status === 'live' && matchData.phase === 'shootout';

  document.getElementById('match-page').innerHTML = `
    <div class="match-card match-detail-card">
      ${renderMatchHeader()}
      ${renderMatchTeams()}
      ${renderMatchStatus()}
      ${renderReferee()}
    </div>
    ${logged && inShootout ? renderShootoutPanel() : ''}
    ${renderAddEventButton()}
    ${inPlay && eventCreateMode ? renderAddEventBox() : ''}
    ${logged && editEventId ? renderEditEventBox() : ''}
    <div id="events-list">${renderEvents(events)}</div>
  `;

  if (inPlay) startTimer();
  if (logged && editEventId) initEditEventBox();
}

function renderShootoutPanel() {
  return `
    <div class="shootout-panel">
      <h3><i class="fa-solid fa-futbol"></i> Calci di rigore</h3>
      <div class="shootout-hint">Pareggio: si va ai rigori (al meglio di ${SHOOTOUT_BEST_OF})</div>

      <div class="shootout-grid">
        <div class="shootout-team">
          <div class="shootout-team-name">${formatTeamName(matchData.home_team_name)}</div>
          <div class="shootout-count">${matchData.home_shootout_score || 0}</div>
          <div class="shootout-controls">
            <button class="so-minus" onclick="addShootout('home', -1)">−</button>
            <button class="so-plus"  onclick="addShootout('home', 1)">+</button>
          </div>
        </div>

        <div class="shootout-sep">-</div>

        <div class="shootout-team">
          <div class="shootout-team-name">${formatTeamName(matchData.away_team_name)}</div>
          <div class="shootout-count">${matchData.away_shootout_score || 0}</div>
          <div class="shootout-controls">
            <button class="so-minus" onclick="addShootout('away', -1)">−</button>
            <button class="so-plus"  onclick="addShootout('away', 1)">+</button>
          </div>
        </div>
      </div>

      <div class="shootout-finish">
        <button class="match-state-btn danger" onclick="finishShootout()">
          <i class="fa-solid fa-flag-checkered"></i> Termina partita
        </button>
      </div>
    </div>`;
}

function renderAddEventBox() {
  return `
    <div class="admin-box">
      <h3><i class="fa-solid fa-plus"></i> Nuovo evento</h3>

      <div class="admin-grid">

        <div class="admin-field">
          <label>Tipo evento</label>
          <select id="event-type" onchange="handleEventTypeChange()">
            <option value="goal">Gol</option>
            <option value="yellow_card">Cartellino Giallo</option>
            <option value="red_card">Cartellino Rosso</option>
            <option value="bonus">Bonus</option>
          </select>
        </div>

        <div class="admin-field">
          <label>Squadra</label>
          <select id="event-team" onchange="renderPlayerSelects()">
            <option value="${matchData.home_team_id}">${formatTeamName(matchData.home_team_name)}</option>
            <option value="${matchData.away_team_id}">${formatTeamName(matchData.away_team_name)}</option>
          </select>
        </div>

        <div class="admin-field">
          <label>Giocatore</label>
          <select id="event-player"></select>
        </div>

        <div class="admin-field" id="goal-type-box">
          <label>Tipo gol</label>
          <select id="goal-type">
            <option value="azione">Azione</option>
            <option value="rigore">Rigore</option>
            <option value="punizione">Punizione</option>
          </select>
        </div>

        <div class="admin-field" id="assist-box">
          <label>Assist opzionale</label>
          <select id="assist-player">
            <option value="">Nessun assist</option>
          </select>
        </div>

        <div class="admin-field hidden" id="bonus-box">
          <label>Bonus</label>
          <select id="bonus-id">
            ${bonuses.map(b => `<option value="${b.id}">${b.name}</option>`).join('')}
          </select>
        </div>

        <div class="admin-field minute-field">
          <label><i class="fa-solid fa-clock"></i> Minuto</label>
          <div class="minute-row">
            <input id="event-minute" disabled value="${getCurrentMinute()}">
            <button onclick="createMatchEvent()">Salva</button>
          </div>
        </div>

      </div>
    </div>
  `;
}

function renderEvents(events) {
  if (!events || !events.length) return '<p>Nessun evento.</p>';

  return `
    <div class="timeline">
      ${events.map(e => {
        const isHome = String(e.team_id) === String(matchData.home_team_id);
        const playerName = e.player_name || formatEventPlayerName(e);
        const playerId   = e.player_id;

        const card = `
          <div class="tl-card">
            ${logged ? `
              <div class="tl-actions">
                <button class="tl-action edit" title="Modifica evento" onclick="openEditEvent(${e.id})">
                  <i class="fa-solid fa-pen"></i>
                </button>
                <button class="tl-action delete" title="Elimina evento" onclick="deleteEvent(${e.id})">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>` : ''}
            <div class="tl-label">${eventLabel(e)}</div>
            <div class="tl-player ${playerId ? 'event-player-link' : ''}"
              ${playerId ? `onclick="goToPlayer(${playerId})"` : ''}>
              ${e.shirt_number ? `#${e.shirt_number} ` : ''}${playerName}
            </div>
            ${e.assist_player_id ? `
              <div class="tl-assist">
                🅰️ <span class="event-player-link" onclick="goToPlayer(${e.assist_player_id})">
                  ${e.assist_first_name ? `${e.assist_first_name} ${e.assist_last_name}` : ''}
                </span>
              </div>` : ''}
          </div>
        `;

        return `
          <div class="tl-row">
            <div class="tl-home">${isHome ? card : ''}</div>
            <div class="tl-center">
              <div class="tl-icon">${eventIcon(e.event_type)}</div>
              <div class="tl-minute">${e.minute}'</div>
            </div>
            <div class="tl-away">${!isHome ? card : ''}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function formatEventPlayerName(e) {
  const first = e.first_name || e.player_first_name || '';
  const last  = e.last_name  || e.player_last_name  || '';
  return `${first} ${last}`.trim();
}

function eventIcon(type) {
  switch (type) {
    case 'goal':        return '⚽';
    case 'yellow_card': return '🟨';
    case 'red_card':    return '🟥';
    case 'bonus':       return '⭐';
    default:            return '•';
  }
}

function eventLabel(e) {
  if (e.event_type === 'goal')        return `Gol - ${e.goal_type || ''}`;
  if (e.event_type === 'yellow_card') return 'Cartellino Giallo';
  if (e.event_type === 'red_card')    return 'Cartellino Rosso';
  if (e.event_type === 'bonus')       return `Bonus - ${e.bonus_name || ''}`;
  return e.event_type;
}

function toggleScheduleEdit() {
  scheduleEditMode = !scheduleEditMode;
  loadMatchPage();
}

function toggleEventCreate() {
  eventCreateMode = !eventCreateMode;
  if (eventCreateMode) editEventId = null;
  loadMatchPage();
}

function renderPlayerSelects() {
  const teamId = document.getElementById('event-team')?.value;
  if (!teamId) return;

  const players = String(teamId) === String(matchData.home_team_id)
    ? homePlayers : awayPlayers;

  const playerSelect = document.getElementById('event-player');
  const assistSelect = document.getElementById('assist-player');
  if (!playerSelect || !assistSelect) return;

  playerSelect.innerHTML = players.map(p =>
    `<option value="${p.id}">#${p.shirt_number} ${p.first_name} ${p.last_name}</option>`
  ).join('');

  assistSelect.innerHTML = `
    <option value="">Nessun assist</option>
    ${players.map(p =>
      `<option value="${p.id}">#${p.shirt_number} ${p.first_name} ${p.last_name}</option>`
    ).join('')}
  `;
}

function handleEventTypeChange() {
  const type = document.getElementById('event-type')?.value;
  if (!type) return;

  document.getElementById('goal-type-box').style.display = 'none';
  document.getElementById('assist-box').style.display    = 'none';
  document.getElementById('bonus-box').style.display     = 'none';

  if (type === 'goal') {
    document.getElementById('goal-type-box').style.display = 'flex';
    document.getElementById('assist-box').style.display    = 'flex';
  }
  if (type === 'bonus') document.getElementById('bonus-box').style.display = 'flex';
}

async function updateMatchDate() {
  const match_date = document.getElementById('match-date').value;

  const res = await fetch(`/matches/${matchId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      group_id:     matchData.group_id,
      home_team_id: matchData.home_team_id,
      away_team_id: matchData.away_team_id,
      match_date,
      pitch_id:     matchData.pitch_id,
      referee_id:   matchData.referee_id,
      status:       matchData.status
    })
  });

  if (!res.ok) {
    const error = await res.json().catch(() => ({}));
    alert(error.error || 'Errore aggiornamento data');
    return;
  }

  scheduleEditMode = false;
  await loadMatchPage();
}

async function startMatch() {
  if (!confirm("Iniziare la partita?")) return;

  const res  = await fetch(`/matches/${matchId}/start`, { method: 'POST' });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) { alert(data.error || 'Errore avvio partita'); return; }
  await loadMatchPage();
}

async function endFirstHalf() {
  if (!confirm("Terminare il 1° tempo? Si va all'intervallo.")) return;

  const res  = await fetch(`/matches/${matchId}/end-first-half`, { method: 'POST' });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) { alert(data.error || 'Errore fine 1° tempo'); return; }
  eventCreateMode = false;
  await loadMatchPage();
}

async function startSecondHalf() {
  if (!confirm("Iniziare il 2° tempo?")) return;

  const res  = await fetch(`/matches/${matchId}/start-second-half`, { method: 'POST' });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) { alert(data.error || 'Errore avvio 2° tempo'); return; }
  await loadMatchPage();
}

async function finishMatch() {
  if (!confirm("Terminare la partita?")) return;

  const res  = await fetch(`/matches/${matchId}/finish`, { method: 'POST' });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) { alert(data.error || 'Errore chiusura partita'); return; }

  if (data.shootout) {
    alert(`Pareggio! Si va ai calci di rigore (al meglio di ${SHOOTOUT_BEST_OF}).`);
  }

  eventCreateMode = false;
  await loadMatchPage();
}

async function addShootout(side, delta) {
  const res  = await fetch(`/matches/${matchId}/shootout`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ side, delta })
  });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) { alert(data.error || 'Errore aggiornamento rigori'); return; }

  // aggiorno solo i dati locali ed eseguo un re-render leggero
  if (data.match) matchData = data.match;
  await loadMatchPage();
}

async function finishShootout() {
  if (!confirm("Confermare il risultato dei rigori e terminare la partita?")) return;

  const res  = await fetch(`/matches/${matchId}/finish-shootout`, { method: 'POST' });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) { alert(data.error || 'Errore chiusura rigori'); return; }
  await loadMatchPage();
}

async function createMatchEvent() {
  const event_type = document.getElementById('event-type').value;
  const team_id    = document.getElementById('event-team').value;
  const player_id  = document.getElementById('event-player').value;
  const minute     = getCurrentMinute();

  const body = {
    match_id:  Number(matchId),
    team_id:   Number(team_id),
    player_id: player_id ? Number(player_id) : null,
    event_type,
    minute
  };

  if (event_type === 'goal') {
    body.goal_type = document.getElementById('goal-type').value;
    const assist = document.getElementById('assist-player').value;
    body.assist_player_id = assist ? Number(assist) : null;
  }

  if (event_type === 'yellow_card' || event_type === 'red_card') {
    body.card_type = event_type;
  }

  if (event_type === 'bonus') {
    body.bonus_id    = Number(document.getElementById('bonus-id').value);
    body.event_value = 1;
  }

  const res = await fetch('/match-events', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const error = await res.json().catch(() => ({}));
    alert(error.error || 'Errore creazione evento');
    return;
  }

  eventCreateMode = false;
  await loadMatchPage();
}

// ── Modifica / eliminazione evento ─────────────────────────────────────────

function openEditEvent(id) {
  editEventId = Number(id);
  eventCreateMode = false;
  loadMatchPage();
}

function cancelEditEvent() {
  editEventId = null;
  loadMatchPage();
}

async function deleteEvent(id) {
  if (!confirm('Eliminare questo evento? Il punteggio verrà aggiornato di conseguenza.')) return;

  const res = await fetch(`/match-events/${id}`, { method: 'DELETE' });
  if (!res.ok) {
    const error = await res.json().catch(() => ({}));
    alert(error.error || 'Errore eliminazione evento');
    return;
  }

  if (editEventId === Number(id)) editEventId = null;
  await loadMatchPage();
}

        </div>

        <div class="admin-field">
          <label>Giocatore</label>
          <select id="edit-event-player"></select>
        </div>

        <div class="admin-field" id="edit-goal-type-box">
          <label>Tipo gol</label>
          <select id="edit-goal-type">
            <option value="azione"    ${sel(e.goal_type,'azione')}>Azione</option>
            <option value="rigore"    ${sel(e.goal_type,'rigore')}>Rigore</option>
            <option value="punizione" ${sel(e.goal_type,'punizione')}>Punizione</option>
          </select>
        </div>

        <div class="admin-field" id="edit-assist-box">
          <label>Assist opzionale</label>
          <select id="edit-assist-player">
            <option value="">Nessun assist</option>
          </select>
        </div>

        <div class="admin-field" id="edit-bonus-box">
          <label>Bonus</label>
          <select id="edit-bonus-id">

function renderEditPlayerSelects() {
  const teamId = document.getElementById('edit-event-team')?.value;
  if (!teamId) return;

  const players = String(teamId) === String(matchData.home_team_id)
    ? homePlayers : awayPlayers;

  const playerSelect = document.getElementById('edit-event-player');
  const assistSelect = document.getElementById('edit-assist-player');
  if (!playerSelect || !assistSelect) return;

  playerSelect.innerHTML = players.map(p =>
    `<option value="${p.id}">#${p.shirt_number} ${p.first_name} ${p.last_name}</option>`
  ).join('');

  assistSelect.innerHTML = `
    <option value="">Nessun assist</option>
    ${players.map(p =>
      `<option value="${p.id}">#${p.shirt_number} ${p.first_name} ${p.last_name}</option>`
    ).join('')}
  `;
}

function handleEditTypeChange() {
  const type = document.getElementById('edit-event-type')?.value;
  if (!type) return;

  document.getElementById('edit-goal-type-box').style.display = 'none';
  document.getElementById('edit-assist-box').style.display    = 'none';
  document.getElementById('edit-bonus-box').style.display     = 'none';

  if (type === 'goal') {
    document.getElementById('edit-goal-type-box').style.display = 'flex';
    document.getElementById('edit-assist-box').style.display    = 'flex';
  }
  if (type === 'bonus') document.getElementById('edit-bonus-box').style.display = 'flex';
}

// Da chiamare dopo aver iniettato l'HTML del box di modifica
function initEditEventBox() {
  const e = allEvents.find(ev => Number(ev.id) === Number(editEventId));
  if (!e) return;

  renderEditPlayerSelects();

  const playerSel = document.getElementById('edit-event-player');
  if (playerSel && e.player_id) playerSel.value = String(e.player_id);

  const assistSel = document.getElementById('edit-assist-player');
  if (assistSel && e.assist_player_id) assistSel.value = String(e.assist_player_id);

  handleEditTypeChange();
}

async function submitEditEvent() {
  const id         = editEventId;
  const event_type = document.getElementById('edit-event-type').value;
  const team_id    = document.getElementById('edit-event-team').value;
  const player_id  = document.getElementById('edit-event-player').value;
  const minute     = Number(document.getElementById('edit-event-minute').value) || 0;

  const body = {
    match_id:  Number(matchId),
    team_id:   Number(team_id),
    player_id: player_id ? Number(player_id) : null,
    event_type,
    minute
  };

  if (event_type === 'goal') {
    body.goal_type = document.getElementById('edit-goal-type').value;
    const assist = document.getElementById('edit-assist-player').value;
    body.assist_player_id = assist ? Number(assist) : null;
  }

  if (event_type === 'yellow_card' || event_type === 'red_card') {
    body.card_type = event_type;
  }

  if (event_type === 'bonus') {
    body.bonus_id    = Number(document.getElementById('edit-bonus-id').value);
    body.event_value = 1;
  }

  const res = await fetch(`/match-events/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const error = await res.json().catch(() => ({}));
    alert(error.error || 'Errore modifica evento');
    return;
  }

  editEventId = null;
  await loadMatchPage();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    const el          = document.getElementById('match-timer');
    const minuteInput = document.getElementById('event-minute');
    if (el)          el.textContent    = getTimerText();
    if (minuteInput) minuteInput.value = getCurrentMinute();
  }, 1000);

  renderPlayerSelects();
  handleEventTypeChange();
}

function parseDate(v) {
  return v ? new Date(v) : null;
}

function parseStartedAt() {
  return parseDate(matchData.started_at);
}

/*
  Tempo di gioco trascorso in ms, escludendo l'intervallo.
  - 1° tempo: scorre da started_at
  - intervallo: congelato alla fine del 1° tempo
  - 2° tempo: durata 1° tempo + tempo dal fischio d'inizio 2° tempo
  - rigori / finita: congelato al tempo totale giocato
*/
function getElapsedMs() {
  const start = parseStartedAt();
  if (!start) return 0;

  const now         = new Date();
  const phase       = matchData.phase;
  const firstEnd    = parseDate(matchData.first_half_ended_at);
  const secondStart = parseDate(matchData.second_half_started_at);
  const ended       = parseDate(matchData.ended_at);
  const firstHalfMs = firstEnd ? (firstEnd - start) : 0;

  if (phase === 'first_half')  return now - start;
  if (phase === 'halftime')    return firstHalfMs;
  if (phase === 'second_half') return firstHalfMs + (secondStart ? (now - secondStart) : 0);

  if (phase === 'shootout' || matchData.status === 'finished') {
    const ref = ended || now;
    return firstHalfMs + (secondStart ? (ref - secondStart) : 0);
  }

  return now - start;
}

function getCurrentMinute() {
  const start = parseStartedAt();
  if (!start) return 0;
  return Math.max(1, Math.floor(getElapsedMs() / 60000) + 1);
}

function getTimerText() {
  const start = parseStartedAt();
  if (!start) return '00:00';
  const diff    = Math.max(0, Math.floor(getElapsedMs() / 1000));
  const minutes = String(Math.floor(diff / 60)).padStart(2, '0');
  const seconds = String(diff % 60).padStart(2, '0');
  return `${minutes}:${seconds}`;
}

function toDateTimeLocal(value) {
  const d = new Date(value);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}

function formatDate(date) {
  const d = new Date(date);
  return d.toLocaleDateString('it-IT') + ' - ' +
    d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}

function formatTeamName(name) {
  if (!name) return '';
  return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}

function getTeamLogo(name) {
  if (!name || !String(name).trim()) return '';
  return `/assets/img/teams/${String(name).toLowerCase().trim().replace(/\s+/g,'_')}_logo.png`;
}

function goToPlayer(id)  { window.location.href = `player.html?id=${id}`; }
function goToTeam(id)    { window.location.href = `team.html?id=${id}`; }
function goToReferee(id) { window.location.href = `referee.html?id=${id}`; }

function hadShootout(m) {
  m = m || matchData;
  return m.phase === 'shootout' ||
         (Number(m.home_shootout_score || 0) + Number(m.away_shootout_score || 0)) > 0;
}

function renderScore(match) {
  if (match.status === 'finished' || match.status === 'live') {
    const base = `${match.home_score || 0} - ${match.away_score || 0}`;
    if (hadShootout(match)) {
      return `${base} <span class="shootout-score-inline">(${match.home_shootout_score || 0}-${match.away_shootout_score || 0})</span>`;
    }
    return base;
  }
  return 'VS';
}

function renderStatus(status, phase) {
  if (status === 'live') {
    switch (phase) {
      case 'first_half':  return '🔴 LIVE · 1° Tempo';
      case 'halftime':    return '⏸ Intervallo';
      case 'second_half': return '🔴 LIVE · 2° Tempo';
      case 'shootout':    return '🥅 Calci di rigore';
      default:            return '🔴 LIVE';
    }
  }
  switch (status) {
    case 'scheduled': return '🕒 In programma';
    case 'finished':  return hadShootout() ? '✅ Terminata (d.c.r.)' : '✅ Terminata';
    default:          return status;
  }
}

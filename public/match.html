<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={corePlugins:{preflight:false},theme:{extend:{colors:{brand:{yellow:'#facc15',blue:'#1d4ed8',green:'#16a34a',dark:'#0f172a'}}}}}</script>
  <title>Partita</title>
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/img/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/img/favicon/favicon-16x16.png">
  <link rel="manifest" href="./assets/img/favicon/site.webmanifest">

  <link rel="stylesheet" href="./custom.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* Stati aggiuntivi (intervallo / rigori) — animazione "blink" disattivata */
    .match-status.halftime { color: #d97706; animation: none; }
    .match-status.shootout { color: #7c3aed; animation: none; }
    .match-status.extratime { color: #16a34a; animation: none; }

    .shootout-score-inline { color: #7c3aed; font-weight: 800; }

    /* Badge recupero (oltre gli 8') */
    .recupero-badge {
      display: inline-block;
      background: #d97706;
      color: #fff;
      font-size: .72em;
      font-weight: 800;
      padding: 1px 7px;
      border-radius: 999px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .shootout-panel {
      margin: 16px 0;
      padding: 18px;
      border: 2px dashed #7c3aed;
      border-radius: 14px;
      background: #faf5ff;
    }
    .shootout-panel h3 {
      margin: 0 0 4px;
      color: #7c3aed;
      text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .shootout-panel .shootout-hint {
      text-align: center; font-size: 13px; opacity: .7; margin-bottom: 14px;
    }
    .shootout-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
    }
    .shootout-team { text-align: center; }
    .shootout-team .shootout-team-name { font-weight: 700; margin-bottom: 8px; }
    .shootout-team .shootout-count { font-size: 38px; font-weight: 900; color: #0f172a; }
    .shootout-controls { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
    .shootout-controls button {
      border: none; border-radius: 8px; width: 42px; height: 42px;
      font-size: 20px; font-weight: 800; cursor: pointer;
    }
    .shootout-controls .so-plus  { background: #16a34a; color: #fff; }
    .shootout-controls .so-minus { background: #e5e7eb; color: #0f172a; }
    .shootout-sep { font-size: 28px; font-weight: 900; opacity: .4; }
    .shootout-finish { margin-top: 16px; text-align: center; }

    /* Shootout tiro-per-tiro */
    .so-attempts { font-size: 12px; opacity: .6; margin-top: 2px; }
    .so-add-row { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
    .so-player-select {
      padding: 7px 8px; border-radius: 8px; border: 1px solid #cbd5e1;
      font-family: inherit; font-size: 13px; width: 100%;
    }
    .so-add-btns { display: flex; gap: 6px; }
    .so-add {
      flex: 1; border: none; border-radius: 8px; padding: 8px 6px;
      font-weight: 700; cursor: pointer; font-family: inherit; font-size: 13px;
    }
    .so-add.made { background: #16a34a; color: #fff; }
    .so-add.miss { background: #e5e7eb; color: #0f172a; }
    .so-add:hover { filter: brightness(.95); }
    .so-kicks { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; text-align: left; }
    .so-kick {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid #ede9fe; border-radius: 8px;
      padding: 5px 8px; font-size: 13px;
    }
    .so-kick.miss { opacity: .6; }
    .so-kick-icon { flex: 0 0 auto; }
    .so-kick-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .so-kick-del {
      border: none; background: #fee2e2; color: #dc2626; border-radius: 6px;
      width: 22px; height: 22px; cursor: pointer; font-size: 11px; flex: 0 0 auto;
    }
    .so-empty { font-size: 12px; opacity: .5; font-style: italic; }
    .shootout-finish-hint { margin-top: 10px; font-size: 12px; color: #7c3aed; opacity: .85; }
    .shootout-finish button:disabled { opacity: .5; cursor: not-allowed; }

    /* Pulsanti modifica/elimina su ogni evento (solo admin) */
    .tl-card { position: relative; }
    .tl-actions {
      position: absolute;
      top: 6px;
      right: 6px;
      display: flex;
      gap: 6px;
    }
    .tl-action {
      border: none;
      border-radius: 6px;
      width: 26px;
      height: 26px;
      font-size: 12px;
      cursor: pointer;
      line-height: 1;
      opacity: .75;
      transition: opacity .15s, transform .15s;
    }
    .tl-action:hover { opacity: 1; transform: scale(1.08); }
    .tl-action.edit   { background: #e0e7ff; color: #1d4ed8; }
    .tl-action.delete { background: #fee2e2; color: #dc2626; }

    /* Squadra di casa: pulsanti evento in alto a SINISTRA */
    .tl-card--home .tl-actions { left: 6px; right: auto; }

    /* Rettangolo del risultato: si adatta quando compare il punteggio shootout */
    .match-detail-card .vs {
      flex: 0 0 auto;
      min-width: 64px;
      max-width: none;
      white-space: normal;
      line-height: 1.2;
      padding: 8px 12px;
    }
    .match-detail-card .vs .shootout-score-inline {
      display: block;
      font-size: 12px;
      margin-top: 2px;
    }

    .edit-cancel-row { text-align: center; margin-top: 8px; }
    .edit-cancel-btn {
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      background: #e5e7eb;
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
    }
    .edit-cancel-btn:hover { background: #d1d5db; }

    /* Campo da gioco nell'header */
    .match-pitch { color: #475569; white-space: nowrap; }

    /* Divisore timeline (Fine 1° tempo) */
    .tl-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px 0;
    }
    .tl-divider-line {
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
    .tl-divider-chip {
      flex: 0 0 auto;
      background: #f1f5f9;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid #e2e8f0;
      white-space: nowrap;
    }
  </style>
</head>

<body class="bg-slate-50">

<header class="navbar">
  <div class="logo">
    <a href="/" class="logo-link">
      <img src="/assets/img/wildcard_logo.png" alt="Torneo Wildcard" class="logo-img">
      <span>WILDCARD</span>
    </a>
  </div>

  <nav>
    <a href="matches.html"><i class="fa-solid fa-calendar"></i> <span class="nav-label">Partite</span></a>
    <a href="standing.html"><i class="fa-solid fa-ranking-star"></i> <span class="nav-label">Classifiche</span></a>
    <a href="players.html"><i class="fa-solid fa-user"></i> <span class="nav-label">Giocatori</span></a>
    <a href="teams.html"><i class="fa-solid fa-users"></i> <span class="nav-label">Squadre</span></a>
    <a href="bar.html"><i class="fa-solid fa-beer-mug-empty"></i> <span class="nav-label">Chiosco</span></a>
  </nav>
</header>

<div class="container">
  <h1>⚽ Partita</h1>

  <div id="match-page">
    <p>Caricamento partita...</p>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
// Numero di rigori per squadra in caso di pareggio.
// Cambia in 3 per "al meglio di 3", 5 per "al meglio di 5", ecc.
const SHOOTOUT_BEST_OF = 5;

// Durata regolamentare di un tempo (minuti). Oltre questa soglia parte il recupero.
const HALF_MINUTES = 8;
const HALF_MS = HALF_MINUTES * 60000;

// Carte speciali del 2° tempo (id salvato in notes → etichetta)
const SPECIAL_CARDS = {
  rigore:      'Rigore',
  shootout:    'Shootout',
  sospensione: 'Sospensione',
  star_player: 'Star Player',
  gol_doppio:  'Gol Doppio',
  jolly:       'Jolly'
};

const params = new URLSearchParams(window.location.search);
const matchId = params.get('id');

let logged = false;
let matchData = null;
let homePlayers = [];
let awayPlayers = [];
let bonuses = [];
let pitches = [];
let timerInterval = null;

let scheduleEditMode = false;
let eventCreateMode = false;
let editEventId = null;
let allEvents = [];

async function checkAuth() {
  try {
    const res = await fetch('/me');
    const data = await res.json();
    logged = data.logged;
  } catch {
    logged = false;
  }
}

async function loadMatchPage() {
  try {
    const matchRes = await fetch(`/matches/${matchId}`);
    matchData = await matchRes.json();

    const refRes = await fetch(`/referees/${matchData.referee_id}`);
    matchData.referee = await refRes.json();

    const homePlayersRes = await fetch(`/players?team_id=${matchData.home_team_id}`);
    homePlayers = await homePlayersRes.json();

    const awayPlayersRes = await fetch(`/players?team_id=${matchData.away_team_id}`);
    awayPlayers = await awayPlayersRes.json();

    const eventsRes = await fetch(`/match-events?match_id=${matchId}`);
    const events = await eventsRes.json();

    const bonusesRes = await fetch('/bonuses');
    bonuses = await bonusesRes.json();

    try {
      const pitchesRes = await fetch('/matches/meta/pitches');
      pitches = await pitchesRes.json();
    } catch {
      pitches = [];
    }

    renderMatch(events);

  } catch (err) {
    console.error(err);
    document.getElementById('match-page').innerHTML =
      '<p style="color:red;">Errore nel caricamento partita</p>';
  }
}

// ── renderMatch helpers ───────────────────────────────────────────────────

function renderMatchHeader() {
  const editBtn = logged ? `
    <button class="match-datetime-edit-toggle" onclick="toggleScheduleEdit()" title="Modifica programmazione">
      <i class="fa-solid ${scheduleEditMode ? 'fa-xmark' : 'fa-pen'}"></i>
    </button>` : '';

  let stateBtns = '';
  if (logged) {
    if (matchData.status === 'scheduled') {
      stateBtns = `
        <button class="match-state-btn" onclick="startMatch()">
          <i class="fa-solid fa-play"></i> Inizia partita
        </button>`;
    } else if (matchData.status === 'live' && matchData.phase === 'first_half') {
      stateBtns = `
        <button class="match-state-btn" onclick="endFirstHalf()">
          <i class="fa-solid fa-hourglass-half"></i> Fine 1° tempo
        </button>`;
    } else if (matchData.status === 'live' && matchData.phase === 'halftime') {
      stateBtns = `
        <button class="match-state-btn" onclick="startSecondHalf()">
          <i class="fa-solid fa-play"></i> Inizia 2° tempo
        </button>`;
    } else if (matchData.status === 'live' && matchData.phase === 'second_half') {
      stateBtns = `
        <button class="match-state-btn danger" onclick="finishMatch()">
          <i class="fa-solid fa-flag-checkered"></i> Termina partita
        </button>`;
    } else if (matchData.status === 'live' && matchData.phase === 'extra_time') {
      const diff = Number(matchData.home_score || 0) !== Number(matchData.away_score || 0);
      stateBtns = diff
        ? `<button class="match-state-btn danger" onclick="resolveExtraTime()">
             <i class="fa-solid fa-flag-checkered"></i> Termina (Golden Goal)
           </button>`
        : `<button class="match-state-btn" onclick="resolveExtraTime()">
             <i class="fa-solid fa-futbol"></i> Nessun gol · Vai agli shootout
           </button>`;
    }
    // durante 'shootout' i comandi sono nel pannello rigori dedicato
  }

  const pitchName = getPitchName(matchData.pitch_id);
  const pitchHtml = pitchName
    ? `<span class="match-pitch">📍 ${pitchName}</span>` : '';

  const scheduleBox = logged && scheduleEditMode ? `
    <div class="schedule-edit-box">
      <input class="match-datetime-input" id="match-date" type="datetime-local" value="${toDateTimeLocal(matchData.match_date)}">
      <select class="match-datetime-input" id="match-pitch">
        ${pitches.map(p => `<option value="${p.id}" ${String(p.id) === String(matchData.pitch_id) ? 'selected' : ''}>${p.name}</option>`).join('')}
      </select>
      <button class="match-datetime-button" onclick="updateSchedule()">Salva programmazione</button>
    </div>` : '';

  const groupHtml = matchData.group_name
    ? `<span class="match-group clickable" onclick="goToStandings()" title="Vai alle classifiche">${matchData.group_name}</span>`
    : '';

  return `
    <div class="match-header match-detail-header">
      <div class="match-header-left">
        <span class="match-date">${formatDate(matchData.match_date)}</span>
        ${pitchHtml}
        ${editBtn}
      </div>
      <div class="match-header-center">${stateBtns}</div>
      ${groupHtml}
    </div>
    ${scheduleBox}`;
}

function renderMatchTeams() {
  const homeLogo = matchData.home_team_name
    ? `<img src="${getTeamLogo(matchData.home_team_name)}" onerror="this.onerror=null; this.style.display='none';">` : '';
  const awayLogo = matchData.away_team_name
    ? `<img src="${getTeamLogo(matchData.away_team_name)}" onerror="this.onerror=null; this.style.display='none';">` : '';

  return `
    <div class="match-teams">
      <div class="team home">
        <span class="team-link" onclick="goToTeam(${matchData.home_team_id})" style="display:contents;">
          ${homeLogo}
          <span class="team-name"><strong>${formatTeamName(matchData.home_team_name)}</strong></span>
        </span>
      </div>
      <div class="vs">${renderScore(matchData)}</div>
      <div class="team away">
        <span class="team-link" onclick="goToTeam(${matchData.away_team_id})" style="display:contents;">
          <span class="team-name"><strong>${formatTeamName(matchData.away_team_name)}</strong></span>
          ${awayLogo}
        </span>
      </div>
    </div>`;
}

function renderMatchStatus() {
  const phase = matchData.phase;
  const running = matchData.status === 'live' &&
                  (phase === 'first_half' || phase === 'second_half');

  const timer = running
    ? `<span class="live-timer-inline">⏱ <span id="match-timer">${renderClockHtml()}</span></span>` : '';

  // Punteggio rigori in corso / a fine partita ai rigori
  const shootout = (matchData.status === 'live' && phase === 'shootout')
    ? `<span class="shootout-score-inline">${matchData.home_shootout_score || 0} - ${matchData.away_shootout_score || 0}</span>`
    : '';

  // Classe CSS: durante intervallo/supplementari/rigori niente "blink" del live
  let statusClass = matchData.status;
  if (matchData.status === 'live' && phase === 'halftime')   statusClass = 'halftime';
  if (matchData.status === 'live' && phase === 'shootout')   statusClass = 'shootout';
  if (matchData.status === 'live' && phase === 'extra_time') statusClass = 'extratime';

  return `<div class="match-status ${statusClass}"><span>${renderStatus(matchData.status, phase)}</span>${timer}${shootout}</div>`;
}

function renderReferee() {
  if (!matchData.referee) return '';
  return `
    <div style="margin-top:14px; text-align:center; font-size:14px; opacity:.7; display:flex; align-items:center; justify-content:center; gap:8px;">
      <img src="/assets/svg/whistle.svg" style="width:25px; height:25px; filter:invert(1); opacity:.7;">
      <span class="event-player-link tl-player" onclick="goToReferee(${matchData.referee.id})">
        ${matchData.referee.first_name} ${matchData.referee.last_name}
      </span>
    </div>`;
}

function renderAddEventButton() {
  const inPlay = matchData.status === 'live' &&
                 (matchData.phase === 'first_half' ||
                  matchData.phase === 'second_half' ||
                  matchData.phase === 'extra_time');
  if (!logged || !inPlay) return '';
  return `
    <div class="match-event-action">
      <button onclick="toggleEventCreate()">
        <i class="fa-solid ${eventCreateMode ? 'fa-xmark' : 'fa-plus'}"></i>
        ${eventCreateMode ? 'Chiudi evento' : 'Aggiungi evento'}
      </button>
    </div>`;
}

// ── renderMatch ───────────────────────────────────────────────────────────

function renderMatch(events) {
  allEvents = events || [];

  const inPlay = matchData.status === 'live' &&
                 (matchData.phase === 'first_half' ||
                  matchData.phase === 'second_half' ||
                  matchData.phase === 'extra_time');
  const inShootout = matchData.status === 'live' && matchData.phase === 'shootout';

  document.getElementById('match-page').innerHTML = `
    <div class="match-card match-detail-card">
      ${renderMatchHeader()}
      ${renderMatchTeams()}
      ${renderMatchStatus()}
      ${renderReferee()}
    </div>
    ${logged && inShootout ? renderShootoutPanel() : ''}
    ${renderAddEventButton()}
    ${inPlay && eventCreateMode ? renderAddEventBox() : ''}
    ${logged && editEventId ? renderEditEventBox() : ''}
    <div id="events-list">${renderEvents(events)}</div>
  `;

  if (inPlay) startTimer();
  if (logged && editEventId) initEditEventBox();
}

// Tiri shootout di un lato (eventi con goal_type='shootout')
function shootoutKicks(side) {
  const teamId = side === 'home' ? matchData.home_team_id : matchData.away_team_id;
  return allEvents.filter(e =>
    e.goal_type === 'shootout' && String(e.team_id) === String(teamId)
  );
}

function shootoutPlayerOptions(side) {
  const players = side === 'home' ? homePlayers : awayPlayers;
  return players.map(p =>
    `<option value="${p.id}">#${p.shirt_number} ${p.first_name} ${p.last_name}</option>`
  ).join('');
}

function renderKickList(side) {
  const kicks = shootoutKicks(side);
  if (!kicks.length) return '<div class="so-empty">Nessun tiro</div>';

  return kicks.map(e => {
    const made = e.event_type === 'goal';
    const name = e.player_name || formatEventPlayerName(e) || '—';
    return `
      <div class="so-kick ${made ? 'made' : 'miss'}">
        <span class="so-kick-icon">${made ? '⚽' : '✗'}</span>
        <span class="so-kick-name">${e.shirt_number ? `#${e.shirt_number} ` : ''}${name}</span>
        <button class="so-kick-del" title="Rimuovi tiro" onclick="removeShootoutKick(${e.id})">✕</button>
      </div>`;
  }).join('');
}

function renderShootoutTeam(side) {
  const name  = side === 'home' ? matchData.home_team_name : matchData.away_team_name;
  const selId = side === 'home' ? 'so-player-home' : 'so-player-away';
  const kicks = shootoutKicks(side);
  const made  = kicks.filter(e => e.event_type === 'goal').length;
  const att   = kicks.length;

  return `
    <div class="shootout-team">
      <div class="shootout-team-name">${formatTeamName(name)}</div>
      <div class="shootout-count">${made}</div>
      <div class="so-attempts">su ${att} tir${att === 1 ? 'o' : 'i'}</div>

      <div class="so-add-row">
        <select class="so-player-select" id="${selId}">
          ${shootoutPlayerOptions(side)}
        </select>
        <div class="so-add-btns">
          <button class="so-add made" onclick="addShootoutKick('${side}', true)">⚽ Segnato</button>
          <button class="so-add miss" onclick="addShootoutKick('${side}', false)">✗ Sbagliato</button>
        </div>
      </div>

      <div class="so-kicks">${renderKickList(side)}</div>
    </div>`;
}

function renderShootoutPanel() {
  const h = shootoutKicks('home');
  const a = shootoutKicks('away');
  const hMade = h.filter(e => e.event_type === 'goal').length;
  const aMade = a.filter(e => e.event_type === 'goal').length;
  const hAtt = h.length, aAtt = a.length;

  // Non può finire in pareggio: stessi tentativi e gol diversi
  const canFinish = hAtt === aAtt && hMade !== aMade;
  let hint = '';
  if (!canFinish) {
    if (hAtt !== aAtt) {
      hint = 'Le due squadre devono aver tirato lo stesso numero di volte.';
    } else {
      hint = 'Parità: si continua a oltranza finché una squadra non è avanti a parità di tiri.';
    }
  }

  return `
    <div class="shootout-panel">
      <h3><i class="fa-solid fa-futbol"></i> Shotout</h3>
      <div class="shootout-hint">Al meglio di ${SHOOTOUT_BEST_OF}, poi a oltranza · i gol contano nei marcatori</div>

      <div class="shootout-grid">
        ${renderShootoutTeam('home')}
        <div class="shootout-sep">-</div>
        ${renderShootoutTeam('away')}
      </div>

      <div class="shootout-finish">
        <button class="match-state-btn danger" onclick="finishShootout()" ${canFinish ? '' : 'disabled'}>
          <i class="fa-solid fa-flag-checkered"></i> Termina partita
        </button>
        ${hint ? `<div class="shootout-finish-hint">${hint}</div>` : ''}
      </div>
    </div>`;
}

function renderAddEventBox() {
  return `
    <div class="admin-box">
      <h3><i class="fa-solid fa-plus"></i> Nuovo evento</h3>

      <div class="admin-grid">

        <div class="admin-field">
          <label>Tipo evento</label>
          <select id="event-type" onchange="handleEventTypeChange()">
            <option value="goal">Gol</option>
            <option value="yellow_card">Cartellino Giallo</option>
            <option value="red_card">Cartellino Rosso</option>
            <option value="bonus">Bonus</option>
            ${matchData.phase === 'second_half'
              ? '<option value="special_card">Carta speciale</option>' : ''}
          </select>
        </div>

        <div class="admin-field">
          <label>Squadra</label>
          <select id="event-team" onchange="renderPlayerSelects()">
            <option value="${matchData.home_team_id}">${formatTeamName(matchData.home_team_name)}</option>
            <option value="${matchData.away_team_id}">${formatTeamName(matchData.away_team_name)}</option>
          </select>
        </div>

        <div class="admin-field">
          <label>Giocatore</label>
          <select id="event-player"></select>
        </div>

        <div class="admin-field" id="goal-type-box">
          <label>Tipo gol</label>
          <select id="goal-type" onchange="updateAssistVisibility()">
            <option value="azione">Azione</option>

// Minuto di gioco in cui si è chiuso il 1° tempo (null se non ancora finito)
function halfTimeEndMinute() {
  const start    = parseStartedAt();
  const firstEnd = parseDate(matchData.first_half_ended_at);
  if (!start || !firstEnd) return null;
  return Math.max(1, Math.floor((firstEnd - start) / 60000));
}

function halfTimeDividerHtml() {
  const m = halfTimeEndMinute();
  if (m === null) return '';
  return `
    <div class="tl-divider">
      <span class="tl-divider-line"></span>
      <span class="tl-divider-chip">⏸ Fine 1° tempo</span>
      <span class="tl-divider-line"></span>
    </div>`;
}

function renderEventRow(e) {
  const isHome = String(e.team_id) === String(matchData.home_team_id);
  const playerName = e.player_name || formatEventPlayerName(e);
  const playerId   = e.player_id;
  const isCard     = e.event_type === 'special_card';

  const card = `
    <div class="tl-card ${isHome ? 'tl-card--home' : ''}">
      ${logged ? `
        <div class="tl-actions">
          ${isCard ? '' : `
          <button class="tl-action edit" title="Modifica evento" onclick="openEditEvent(${e.id})">
            <i class="fa-solid fa-pen"></i>
          </button>`}
          <button class="tl-action delete" title="Elimina evento" onclick="deleteEvent(${e.id})">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>` : ''}
      <div class="tl-label">${eventLabel(e)}</div>
      ${playerName ? `
      <div class="tl-player ${playerId ? 'event-player-link' : ''}"
        ${playerId ? `onclick="goToPlayer(${playerId})"` : ''}>
        ${e.shirt_number ? `#${e.shirt_number} ` : ''}${playerName}
      </div>` : ''}
      ${e.assist_player_id ? `
        <div class="tl-assist">
          🅰️ <span class="event-player-link" onclick="goToPlayer(${e.assist_player_id})">
            ${e.assist_first_name ? `${e.assist_first_name} ${e.assist_last_name}` : ''}
          </span>
        </div>` : ''}
    </div>
  `;

  return `
    <div class="tl-row">
      <div class="tl-home">${isHome ? card : ''}</div>
      <div class="tl-center">
        <div class="tl-icon">${eventIcon(e.event_type)}</div>
        <div class="tl-minute">${e.minute}'</div>
      </div>
      <div class="tl-away">${!isHome ? card : ''}</div>
    </div>
  `;
}

function renderEvents(events) {
  // I tiri dello shootout non vanno nella timeline: stanno solo nel pannello
  events = (events || []).filter(e => e.goal_type !== 'shootout');

  const divider  = halfTimeDividerHtml();   // '' se 1° tempo non ancora finito
  const halfEnd  = halfTimeEndMinute();

  if (!events || !events.length) {
    // Senza eventi mostro comunque il marcatore se il 1° tempo è finito
    return divider ? `<div class="timeline">${divider}</div>` : '<p>Nessun evento.</p>';
  }

  let dividerDone = false;
  const rows = [];

  events.forEach(e => {
    if (divider && !dividerDone && halfEnd !== null && Number(e.minute) > halfEnd) {
      rows.push(divider);
      dividerDone = true;
    }
    rows.push(renderEventRow(e));
  });

  if (divider && !dividerDone) rows.push(divider);

  return `<div class="timeline">${rows.join('')}</div>`;
}

function formatEventPlayerName(e) {
  const first = e.first_name || e.player_first_name || '';
  const last  = e.last_name  || e.player_last_name  || '';
  return `${first} ${last}`.trim();
}

function eventIcon(type) {
  switch (type) {
    case 'goal':         return '⚽';
    case 'yellow_card':  return '🟨';
    case 'red_card':     return '🟥';
    case 'bonus':        return '⭐';
    case 'special_card': return '🃏';
    default:             return '•';
  }
}

function goalTypeLabel(gt) {
  switch (gt) {
    case 'azione':               return 'azione';
    case 'rigore':               return 'rigore';
    case 'punizione':            return 'punizione';
    case 'rigore_presidenziale': return 'rigore presidenziale';
    case 'shootout':             return 'shootout';
    default:                     return gt || '';
  }
}

function eventLabel(e) {
  if (e.event_type === 'goal') {
    const dbl = Number(e.event_value) === 2 ? ' ×2' : '';
    return `Gol - ${goalTypeLabel(e.goal_type)}${dbl}`;
  }
  if (e.event_type === 'yellow_card') return 'Cartellino Giallo';
  if (e.event_type === 'red_card')    return 'Cartellino Rosso';
  if (e.event_type === 'special_card') {
    return `Carta: ${SPECIAL_CARDS[e.notes] || e.notes || ''}`;
  }
  if (e.event_type === 'bonus') {
    const suffix = e.bonus_outcome === 'missed' ? ' · sbagliato' : '';
    return `Bonus - ${e.bonus_name || ''}${suffix}`;
  }
  return e.event_type;
}

    ).join('');

  if (assistSelect) {
    assistSelect.innerHTML = `
      <option value="">Nessun assist</option>

        `<option value="${p.id}">#${p.shirt_number} ${p.first_name} ${p.last_name}</option>`
      ).join('')}
    `;
  }

  const cardPlayer = document.getElementById('card-player');
  if (cardPlayer) {

        `<option value="${p.id}">#${p.shirt_number} ${p.first_name} ${p.last_name}</option>`

function handleEventTypeChange() {
  const type = document.getElementById('event-type')?.value;
  if (!type) return;

  const show = (id, on) => {
    const el = document.getElementById(id);
    if (el) el.style.display = on ? 'flex' : 'none';
  };

  show('goal-type-box', false);
  show('goal-value-box', false);
  show('assist-box', false);
  show('bonus-box', false);
  show('bonus-outcome-box', false);
  show('card-box', false);
  show('card-player-box', false);

  // Il giocatore non serve per le carte (è opzionale, ha il suo select)
  const playerBox = document.getElementById('event-player')?.closest('.admin-field');
  if (playerBox) playerBox.style.display = (type === 'special_card') ? 'none' : 'flex';

  if (type === 'goal') {
    show('goal-type-box', true);
    show('goal-value-box', true);
    updateAssistVisibility();
  }
  if (type === 'bonus') {
    show('bonus-box', true);
    show('bonus-outcome-box', true);
  }
  if (type === 'special_card') {
    show('card-box', true);
    show('card-player-box', true);
  }
}

function updateAssistVisibility() {
  const type     = document.getElementById('event-type')?.value;
  const goalType = document.getElementById('goal-type')?.value;
  const assistBox = document.getElementById('assist-box');
  if (!assistBox) return;
  assistBox.style.display = (type === 'goal' && goalType === 'azione') ? 'flex' : 'none';

async function updateSchedule() {
  const match_date = document.getElementById('match-date').value;
  const pitchSel   = document.getElementById('match-pitch');
  const pitch_id   = pitchSel ? (pitchSel.value || null) : matchData.pitch_id;

  const res = await fetch(`/matches/${matchId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      group_id:     matchData.group_id,
      home_team_id: matchData.home_team_id,
      away_team_id: matchData.away_team_id,
      match_date,
      pitch_id,
      referee_id:   matchData.referee_id,
      status:       matchData.status
    })
  });

  if (!res.ok) {
    const error = await res.json().catch(() => ({}));
    alert(error.error || 'Errore aggiornamento programmazione');
    return;
  }

  scheduleEditMode = false;
  await loadMatchPage();
}

}

async function finishMatch() {
  if (!confirm("Terminare la partita?")) return;

  const res  = await fetch(`/matches/${matchId}/finish`, { method: 'POST' });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) { alert(data.error || 'Errore chiusura partita'); return; }

  if (data.extra_time) {
    alert('Pareggio! Si giocano 2 minuti supplementari (Golden Goal): il primo gol vince. Se nessuno segna si va agli shootout.');
  } else if (data.shootout) {
    alert(`Pareggio! Si va agli shotout (al meglio di ${SHOOTOUT_BEST_OF}).`);
  }

  eventCreateMode = false;
  await loadMatchPage();
}

async function resolveExtraTime() {
  const diff = Number(matchData.home_score || 0) !== Number(matchData.away_score || 0);
  const msg = diff
    ? 'Confermare il Golden Goal e terminare la partita?'
    : 'Nessun gol nei supplementari: andare agli shootout?';
  if (!confirm(msg)) return;

  const res  = await fetch(`/matches/${matchId}/resolve-extratime`, { method: 'POST' });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) { alert(data.error || 'Errore supplementari'); return; }

  if (data.shootout) {
    alert(`Si va agli shootout (al meglio di ${SHOOTOUT_BEST_OF}): 2 punti al vincitore, 1 al perdente.`);
  }

  eventCreateMode = false;
  await loadMatchPage();
}

async function createMatchEvent() {
  const event_type = document.getElementById('event-type').value;
  const team_id    = document.getElementById('event-team').value;
  const minute     = getCurrentMinute();

  const body = {
    match_id:  Number(matchId),
    team_id:   Number(team_id),
    event_type,
    minute
  };

  // Carta speciale: giocatore opzionale, tipo carta in notes
  if (event_type === 'special_card') {
    const cardPlayer = document.getElementById('card-player').value;
    body.player_id = cardPlayer ? Number(cardPlayer) : null;
    body.notes     = document.getElementById('card-type-select').value;
  } else {
    const player_id = document.getElementById('event-player').value;
    body.player_id  = player_id ? Number(player_id) : null;
  }

  if (event_type === 'goal') {
    body.goal_type   = document.getElementById('goal-type').value;
    body.event_value = Number(document.getElementById('goal-value').value) || 1;
    if (body.goal_type === 'azione') {
      const assist = document.getElementById('assist-player').value;
      body.assist_player_id = assist ? Number(assist) : null;
    } else {
      body.assist_player_id = null;   // rigore/punizione: nessun assist
    }
  }

  if (event_type === 'yellow_card' || event_type === 'red_card') {
    body.card_type = event_type;
  }

  if (event_type === 'bonus') {
    body.bonus_id      = Number(document.getElementById('bonus-id').value);
    body.bonus_outcome = document.getElementById('bonus-outcome').value;
  }

  const res = await fetch('/match-events', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const error = await res.json().catch(() => ({}));
    alert(error.error || 'Errore creazione evento');
    return;
  }

  eventCreateMode = false;
  await loadMatchPage();
}

}

async function submitEditEvent() {
  const id         = editEventId;
  const event_type = document.getElementById('edit-event-type').value;
  const team_id    = document.getElementById('edit-event-team').value;
  const player_id  = document.getElementById('edit-event-player').value;
  const minute     = Number(document.getElementById('edit-event-minute').value) || 0;

  const body = {
    match_id:  Number(matchId),
    team_id:   Number(team_id),
    player_id: player_id ? Number(player_id) : null,
    event_type,
    minute
  };

  if (event_type === 'goal') {
    body.goal_type   = document.getElementById('edit-goal-type').value;
    body.event_value = Number(document.getElementById('edit-goal-value').value) || 1;
    if (body.goal_type === 'azione') {
      const assist = document.getElementById('edit-assist-player').value;
      body.assist_player_id = assist ? Number(assist) : null;
    } else {
      body.assist_player_id = null;   // rigore/punizione: nessun assist
    }
  }

  if (event_type === 'yellow_card' || event_type === 'red_card') {
    body.card_type = event_type;
  }

  if (event_type === 'bonus') {
    body.bonus_id      = Number(document.getElementById('edit-bonus-id').value);
    body.bonus_outcome = document.getElementById('edit-bonus-outcome').value;
  }

  const res = await fetch(`/match-events/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const error = await res.json().catch(() => ({}));
    alert(error.error || 'Errore modifica evento');
    return;
  }

  editEventId = null;
  await loadMatchPage();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    const el          = document.getElementById('match-timer');
    const minuteInput = document.getElementById('event-minute');
    if (el)          el.innerHTML      = renderClockHtml();
    if (minuteInput) minuteInput.value = getCurrentMinute();
  }, 1000);

  renderPlayerSelects();
  handleEventTypeChange();
}

function parseDate(v) {
  return v ? new Date(v) : null;
}

function parseStartedAt() {
  return parseDate(matchData.started_at);
}

/*
  Tempo di gioco trascorso in ms, escludendo l'intervallo.
  - 1° tempo: scorre da started_at
  - intervallo: congelato alla fine del 1° tempo
  - 2° tempo: durata 1° tempo + tempo dal fischio d'inizio 2° tempo
  - rigori / finita: congelato al tempo totale giocato
*/
function getElapsedMs() {
  const start = parseStartedAt();
  if (!start) return 0;

  const now         = new Date();
  const phase       = matchData.phase;
  const firstEnd    = parseDate(matchData.first_half_ended_at);
  const secondStart = parseDate(matchData.second_half_started_at);
  const ended       = parseDate(matchData.ended_at);
  const firstHalfMs = firstEnd ? (firstEnd - start) : 0;

  if (phase === 'first_half')  return now - start;
  if (phase === 'halftime')    return firstHalfMs;
  if (phase === 'second_half') return firstHalfMs + (secondStart ? (now - secondStart) : 0);

  if (phase === 'shootout' || matchData.status === 'finished') {
    const ref = ended || now;
    return firstHalfMs + (secondStart ? (ref - secondStart) : 0);
  }

  return now - start;
}

function getCurrentMinute() {
  const start = parseStartedAt();
  if (!start) return 0;
  return Math.max(1, Math.floor(getElapsedMs() / 60000) + 1);
}

function getTimerText() {
  const start = parseStartedAt();
  if (!start) return '00:00';
  const diff    = Math.max(0, Math.floor(getElapsedMs() / 1000));
  const minutes = String(Math.floor(diff / 60)).padStart(2, '0');
  const seconds = String(diff % 60).padStart(2, '0');
  return `${minutes}:${seconds}`;
}

/*
  Orologio "stile calcio": conta il tempo in corso e, superati gli 8',
  congela il display a fine tempo (8:00 / 16:00) e mostra il recupero +M:SS.
  - 1° tempo: base 0:00, scorre da started_at
  - 2° tempo: base 8:00 (un tempo), scorre da second_half_started_at
*/
function currentHalfMs() {
  const start = parseStartedAt();
  if (!start) return { base: 0, half: 0 };

  const now   = new Date();
  const phase = matchData.phase;

  if (phase === 'first_half') {
    return { base: 0, half: Math.max(0, now - start) };
  }
  if (phase === 'second_half') {
    const secondStart = parseDate(matchData.second_half_started_at);
    return { base: HALF_MS, half: Math.max(0, secondStart ? (now - secondStart) : 0) };
  }
  // fasi non in gioco: fallback al tempo totale
  return { base: 0, half: Math.max(0, getElapsedMs()) };
}

function renderClockHtml() {
  const { base, half } = currentHalfMs();
  const reg      = Math.min(half, HALF_MS);
  const recupero = Math.max(0, half - HALF_MS);

  const mainSec = Math.floor((base + reg) / 1000);
  const main = `${String(Math.floor(mainSec / 60)).padStart(2, '0')}:${String(mainSec % 60).padStart(2, '0')}`;

  if (recupero > 0) {
    const rs  = Math.floor(recupero / 1000);
    const rec = `${Math.floor(rs / 60)}:${String(rs % 60).padStart(2, '0')}`;
    return `${main} <span class="recupero-badge" title="Recupero">+${rec}</span>`;
  }
  return main;
}

function toDateTimeLocal(value) {
  const d = new Date(value);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}

function formatDate(date) {
  const d = new Date(date);
  return d.toLocaleDateString('it-IT') + ' - ' +
    d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}

function formatTeamName(name) {
  if (!name) return '';
  return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}

function getTeamLogo(name) {
  if (!name || !String(name).trim()) return '';
  return `/assets/storage/teams/${String(name).toLowerCase().trim().replace(/\s+/g,'_')}_logo.png`;
}

function goToPlayer(id)  { window.location.href = `player.html?id=${id}`; }
function goToTeam(id)    { window.location.href = `team.html?id=${id}`; }
function goToReferee(id) { window.location.href = `referee.html?id=${id}`; }
function goToStandings() { window.location.href = 'standing.html'; }

function getPitchName(id) {
  if (!id) return '';
  const p = pitches.find(x => String(x.id) === String(id));
  return p ? p.name : '';
}

function hadShootout(m) {
  m = m || matchData;
  return m.phase === 'shootout' ||
         (Number(m.home_shootout_score || 0) + Number(m.away_shootout_score || 0)) > 0;
}

function renderScore(match) {
  if (match.status === 'finished' || match.status === 'live') {
    const base = `${match.home_score || 0} - ${match.away_score || 0}`;
    if (hadShootout(match)) {
      return `${base} <span class="shootout-score-inline">(${match.home_shootout_score || 0}-${match.away_shootout_score || 0})</span>`;
    }
    return base;
  }
  return 'VS';
}

function renderStatus(status, phase) {
  if (status === 'live') {
    switch (phase) {
      case 'first_half':  return '🔴 LIVE · 1° Tempo';
      case 'halftime':    return '⏸ Intervallo';
      case 'second_half': return '🔴 LIVE · 2° Tempo';
      case 'extra_time':  return '⚽ Supplementari · Golden Goal';
      case 'shootout':    return '🥅 Shotout';
      default:            return '🔴 LIVE';
    }
  }
  switch (status) {
    case 'scheduled': return '🕒 In programma';
    case 'finished':  return hadShootout() ? '✅ Terminata (dopo shotout)' : '✅ Terminata';
    default:          return status;
  }
}

(async () => {
  await checkAuth();
  await loadMatchPage();
})();
